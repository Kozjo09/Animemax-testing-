<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="k-session" content="">
    <title>AnimeMax Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- HLS.js for native m3u8 streaming -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <!-- reCAPTCHA v3 voor de nieuwe API calls -->
    <script src="https://www.google.com/recaptcha/api.js?render=6LfzHX8sAAAAAN70WElpj4nM__wxhllZQNZCAFGb"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&display=swap');
        body { 
            background: #060606; 
            color: #ffffff; 
            font-family: 'Outfit', sans-serif; 
            overflow-x: hidden; 
            -webkit-tap-highlight-color: transparent; 
        }
        .accent { color: #cae962; } /* Lime Green Theme */
        .bg-accent { background-color: #cae962; color: #000; }
        .text-accent-glow { text-shadow: 0 0 10px rgba(202, 233, 98, 0.4); }
        .glass-header { 
            background: rgba(6, 6, 6, 0.2); 
            backdrop-filter: blur(0px); 
            -webkit-backdrop-filter: blur(0px); 
            transition: all 0.4s ease-in-out; 
        }
        .glass-header.scrolled { 
            background: rgba(10, 10, 10, 0.95); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
        }
        .card { 
            background: #111111; 
            border-radius: 12px; 
            border: 1px solid rgba(255, 255, 255, 0.03); 
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); 
        }
        .card:hover { 
            transform: translateY(-4px); 
            border-color: rgba(202, 233, 98, 0.3); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); 
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Horizontal Scroll Shelf */
        .shelf-container {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            scroll-behavior: smooth;
            padding-bottom: 16px;
        }

        /* Toggle Switch */
        .toggle-checkbox:checked + .toggle-bg { background-color: #cae962; }
        .toggle-checkbox:checked + .toggle-bg .toggle-dot { transform: translateX(100%); background-color: #000000; }
        
        /* Toast Container */
        #toast-container {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 380px;
            z-index: 10000;
            pointer-events: none;
        }

        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-toast { animation: slideDown 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Custom Video Player Styling */
        video::cue {
            background-color: transparent;
            color: white;
            text-shadow: 2px 2px 4px #000, -2px -2px 4px #000, 2px -2px 4px #000, -2px 2px 4px #000;
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
        }
    </style>
</head>
<body class="pb-32 relative">

    <div id="toast-container" class="flex flex-col gap-2"></div>

    <!-- Confirm Modal -->
    <div id="confirm-modal" class="fixed inset-0 bg-black/90 backdrop-blur-sm z-[10000] hidden items-center justify-center p-4">
        <div class="bg-[#121212] border border-white/5 p-6 rounded-2xl max-w-sm w-full shadow-2xl">
            <h3 id="confirm-title" class="text-lg font-black uppercase tracking-wider mb-2">Bevestigen</h3>
            <p id="confirm-message" class="text-zinc-400 text-xs leading-relaxed mb-6"></p>
            <div class="flex gap-3">
                <button id="confirm-cancel-btn" class="flex-1 bg-zinc-900 border border-white/5 py-3 rounded-xl text-xs font-black uppercase">Annuleren</button>
                <button id="confirm-ok-btn" class="flex-1 bg-[#cae962] text-black py-3 rounded-xl text-xs font-black uppercase font-bold">Bevestigen</button>
            </div>
        </div>
    </div>

    <!-- Lime-Green Glass Header -->
    <header id="app-header" class="fixed top-0 left-0 right-0 z-50 glass-header p-4 lg:px-10 hidden">
        <div class="flex items-center justify-between max-w-7xl mx-auto">
            <div class="flex items-center gap-6 lg:gap-12">
                <button onclick="nav('home')" class="text-2xl lg:text-3xl font-black italic uppercase tracking-tighter text-[#cae962] transition-transform hover:scale-105">ANIME<span class="text-white">MAX</span></button>
                <nav class="hidden md:flex items-center gap-6 text-[11px] font-black uppercase tracking-widest text-zinc-400">
                    <button onclick="nav('home')" class="hover:text-white transition-colors" id="head-nav-home">Home</button>
                    <button onclick="nav('library')" class="hover:text-white transition-colors" id="head-nav-library">Mijn Lijst</button>
                    <button onclick="nav('recent')" class="hover:text-white transition-colors" id="head-nav-recent">Verder Kijken</button>
                </nav>
            </div>
            <div class="flex gap-4 items-center">
                <button onclick="nav('search')" class="w-10 h-10 rounded-full bg-zinc-900/60 flex items-center justify-center border border-white/5 hover:border-[#cae962]/40 text-zinc-300 hover:text-[#cae962] transition-all duration-300" title="Zoeken"><i class="fa-solid fa-search text-xs"></i></button>
                <button onclick="nav('profile')" id="prof-btn" class="w-10 h-10 rounded-full bg-zinc-900/60 flex items-center justify-center border border-white/5 hover:border-[#cae962]/40 text-zinc-300 hover:text-white transition-all duration-300" title="Profiel & Instellingen">
                    <i class="fa-solid fa-user-astronaut"></i>
                </button>
                <button onclick="logout()" class="w-10 h-10 rounded-full bg-red-950/20 hover:bg-red-700 border border-red-500/10 hover:border-transparent flex items-center justify-center text-red-400 hover:text-white transition-all duration-300" title="Uitloggen"><i class="fa-solid fa-sign-out-alt text-xs"></i></button>
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main id="content" class="p-4 pt-24 max-w-7xl mx-auto min-h-[60vh]">
        <div class="text-center py-24" id="main-loader">
            <i class="fa-solid fa-circle-notch animate-spin text-4xl text-[#cae962] mb-4"></i>
            <p class="text-xs uppercase tracking-widest text-zinc-500 animate-pulse">Laden en cloud-database verbinden...</p>
        </div>
    </main>

    <!-- Bottom Navigation for Mobile -->
    <nav id="app-navigation" class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-black/90 backdrop-blur-xl rounded-[2rem] p-2 flex justify-around items-center shadow-2xl z-[100] border border-white/10 md:hidden hidden">
        <button onclick="nav('home')" class="p-3.5 nav-link hover:text-white transition-colors" id="nav-home" title="Home"><i class="fa-solid fa-house"></i></button>
        <button onclick="nav('recent')" class="p-3.5 nav-link hover:text-white transition-colors" id="nav-recent" title="Verder Kijken"><i class="fa-solid fa-clock-rotate-left"></i></button>
        <button onclick="nav('library')" class="p-3.5 nav-link hover:text-white transition-colors" id="nav-library" title="Bibliotheek"><i class="fa-solid fa-layer-group"></i></button>

    </nav>

    <!-- Netflix-style Details Slide-up Modal Drawer -->
    <div id="details-modal" class="fixed inset-0 bg-black/95 backdrop-blur-md z-[5000] hidden overflow-y-auto no-scrollbar justify-center items-start p-4 md:p-10">
        <div class="bg-[#111111] border border-white/5 rounded-3xl max-w-4xl w-full shadow-2xl overflow-hidden relative mt-10 md:mt-16 mb-20">
            <!-- Close Button -->
            <button onclick="closeDetailsModal()" class="absolute top-4 right-4 w-10 h-10 rounded-full bg-black/70 hover:bg-black text-white flex items-center justify-center border border-white/5 hover:border-white/20 transition-all z-50">
                <i class="fa-solid fa-times"></i>
            </button>

            <!-- Backdrop Banner -->
            <div class="relative w-full h-[25vh] md:h-[45vh] bg-zinc-950">
                <div class="absolute inset-0 bg-gradient-to-t from-[#111111] to-transparent z-10"></div>
                <img id="detail-banner" class="w-full h-full object-cover">
                <div class="absolute bottom-6 left-6 md:left-10 z-20 flex gap-6 items-end">
                    <img id="detail-poster" class="hidden md:block w-28 h-40 rounded-xl object-cover shadow-2xl border border-white/10">
                    <div class="space-y-3">
                        <span id="detail-badge" class="px-2.5 py-1 rounded bg-[#cae962]/20 text-[#cae962] text-[9px] font-black uppercase tracking-wider">SHOW</span>
                        <h2 id="detail-title" class="text-2xl md:text-5xl font-black italic uppercase tracking-tighter text-white leading-none"></h2>
                        <div class="flex items-center gap-3 text-[10px] md:text-xs font-bold text-zinc-400">
                            <span id="detail-score" class="text-accent bg-lime-500/10 px-2 py-0.5 rounded font-black"><i class="fa-solid fa-star text-[9px] mr-1"></i></span>
                            <span id="detail-year" class="bg-zinc-800 px-2 py-0.5 rounded"></span>
                            <span id="detail-episodes" class="bg-zinc-800 px-2 py-0.5 rounded"></span>
                            <span id="detail-status" class="bg-zinc-800 px-2 py-0.5 rounded"></span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="p-6 md:p-10 space-y-10">
                <!-- Synopsis / Overview -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="md:col-span-2 space-y-4">
                        <h3 class="text-xs font-black uppercase tracking-wider text-zinc-500">Beschrijving</h3>
                        <p id="detail-desc" class="text-zinc-300 text-sm leading-relaxed"></p>
                        <div id="detail-genres" class="flex flex-wrap gap-2 pt-2"></div>
                    </div>
                    <div class="space-y-4">
                        <h3 class="text-xs font-black uppercase tracking-wider text-zinc-500">Mijn Lijst Status</h3>
                        <div class="bg-zinc-900/60 p-4 rounded-xl border border-white/5 space-y-4">
                            <div>
                                <p class="text-[9px] font-black text-zinc-500 uppercase">Huidige Status</p>
                                <h4 id="detail-action-text" class="text-xs font-bold text-white mt-1">Niet opgeslagen</h4>
                            </div>
                            <select id="detail-status-dropdown" onchange="onDetailStatusChange(this)" class="w-full bg-black border border-white/10 p-3 rounded-lg text-xs font-bold text-white outline-none">
                                <option value="Not Watching">Niet in lijst</option>
                                <option value="Watching">Watching</option>
                                <option value="Watched">Completed</option>
                                <option value="Dropped">Dropped</option>
                                <option value="Plan to Watch">Plan to Watch</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Characters Grid -->
                <div class="space-y-4">
                    <h3 class="text-xs font-black uppercase tracking-wider text-zinc-500">Karakters</h3>
                    <div id="detail-characters" class="flex gap-4 overflow-x-auto no-scrollbar pb-2">
                        <!-- Filled dynamically -->
                    </div>
                </div>

                <!-- Interactive Episodes -->
                <div class="space-y-4">
                    <h3 class="text-xs font-black uppercase tracking-wider text-zinc-500">Afleveringen</h3>
                    <div id="detail-episodes-grid" class="grid grid-cols-5 sm:grid-cols-10 gap-2">
                        <!-- Episode buttons -->
                    </div>
                </div>

                <!-- Relations -->
                <div class="space-y-4">
                    <h3 class="text-xs font-black uppercase tracking-wider text-zinc-500">Gerelateerd</h3>
                    <div id="detail-relations-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        <!-- Sequel, prequels -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ONE COHESIVE JAVASCRIPT BLOCK -->
    <script>
        // Global State Variables
        const ANILIST_ENDPOINT = 'https://graphql.anilist.co';
        const ANIVEXA_BASE = 'https://anivexa-three.vercel.app'; 
        const SUPABASE_URL = "https://zieuivzmzzxbraefeovl.supabase.co";
        const SUPABASE_KEY = "sb_publishable_EpN5OqgyzVvorrR27-V2MA_ZPCnD7He";
        const ANILIST_API = 'https://graphql.anilist.co';
        const EMBED_PROVIDERS = ['anikoto', 'animegg', 'anidbapp', 'reanime', 'anineko'];

        let sb = null;
        let sessionData = null;
        let saveInterval = null;
        let saveTimeout = null;
        let dubTimeout = null;
        let lazyObserver = null;
        let searchTimeout = null;
        let countdownInterval = null;
        let hlsInstance = null;
        let anivexaEpisodesCache = {}; 
        let autoNextTriggered = false;

        let app = {
            view: 'home', id: null, ep: 1, mode: 'sub', server: 'megaplay', searchQuery: '', libraryFilter: 'All',
            user: 'Gebruiker', showContinue: true, lang: 'english', autoPlay: true, autoNext: true, autoSkipIntro: false, skipSeconds: 85, 
            defaultAudio: 'sub', recent: [], xmlLib: [], autoDubFallback: true
        };

        let currentPlaybackTime = 0;
        let currentDuration = 0;
        let activeModalId = null;

        // Custom Anivexa dedicated HLS proxy for flawless direct streaming
        function proxyM3u8(url) {
            if (!url) return "";
            if (url.includes('proxy/hls')) return url;
            return `https://anivexa-three.vercel.app/proxy/hls?url=${encodeURIComponent(url)}`;
        }

        // Direct fetch without proxy for maximum stability and speed
        async function fetchWithCorsFallback(url) {
            return await fetch(url);
        }

        // Custom GraphQL Caller with automatic AniList Access Token binding
        async function gql(query, vars) {
            const headers = { 'Content-Type': 'application/json' };
            if (app.anilistToken) {
                headers['Authorization'] = 'Bearer ' + app.anilistToken;
            }
            try {
                const r = await fetch(ANILIST_API, { 
                    method: 'POST', 
                    headers: headers, 
                    body: JSON.stringify({ query, variables: vars }) 
                });
                return await r.json();
            } catch(e) { 
                return null; 
            }
        }

        // Sync local settings/tokens to database
        async function saveCloudData() {
            if (!sessionData) return;
            const settingsPayload = { 
                defaultAudio: app.defaultAudio, 
                server: app.server, 
                user: app.user, 
                showContinue: app.showContinue, 
                lang: app.lang, 
                autoPlay: app.autoPlay, 
                autoNext: app.autoNext, 
                autoSkipIntro: app.autoSkipIntro, 
                skipSeconds: app.skipSeconds, 
                autoDubFallback: app.autoDubFallback,
                anilistToken: app.anilistToken || null 
            };
            await sb.from('anime_users').update({
                watchlist: app.xmlLib, 
                recent: app.recent,
                settings: settingsPayload
            }).eq('id', sessionData.user.id);
        }
        function saveCloudDataDebounced() { clearTimeout(saveTimeout); saveTimeout = setTimeout(saveCloudData, 1000); }

        // =========================================================================
        // VIEW MANAGEMENT / ROUTING
        // =========================================================================
        window.nav = function(view, params = {}) {
            if (!sessionData) return showLoginPage('login');
            if (app.view === 'watch' && app.id) saveCurrentVideoTime();
            
            clearInterval(saveInterval); 
            clearTimeout(dubTimeout);
            clearInterval(countdownInterval);
            if (lazyObserver) lazyObserver.disconnect();
            if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }

            app.view = view; app.id = params.id || null; app.ep = params.ep || 1;
            if (view === 'watch') { app.mode = app.defaultAudio; currentPlaybackTime = 0; currentDuration = 0; }
            
            syncStateToUrl(); render(); window.scrollTo(0,0);
        };

        function syncStateToUrl() {
            let hash = `#${app.view}`;
            if (app.id) hash += `?id=${app.id}${app.ep ? '&ep=' + app.ep : ''}`;
            if (window.location.hash !== hash) history.replaceState(null, null, hash);
        }

        function restoreStateFromUrl() {
            const hash = window.location.hash;
            if (!hash || hash === '#') { app.view = 'home'; app.id = null; app.ep = 1; return; }
            const parts = hash.substring(1).split('?');
            app.view = parts[0] || 'home'; app.id = null; app.ep = 1;

            if (parts[1]) {
                const params = new URLSearchParams(parts[1]);
                if (params.has('id')) app.id = params.get('id');
                if (params.has('ep')) app.ep = parseInt(params.get('ep') || '1');
            }
        }
        window.onhashchange = () => { restoreStateFromUrl(); render(); };

        // Scroll listener for sticky transparent header
        window.addEventListener('scroll', () => {
            const header = document.getElementById('app-header');
            if (!header) return;
            if (window.scrollY > 40) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        });

        // =========================================================================
        // USER AUTH & FORGOT PASSWORD FLOWS (PRESERVING EXACT ORIGINAL SIGN IN/OUT & OAUTH)
        // =========================================================================
        function showLoginPage(mode = 'login') {
            document.getElementById('app-header').classList.add('hidden');
            document.getElementById('app-navigation').classList.add('hidden');
            const main = document.getElementById('content');
            if(!main) return;
            
            if (mode === 'register') {
                main.innerHTML = `
                    <div class="max-w-md mx-auto mt-16 p-8 card border border-white/5 shadow-2xl animate-fade-in bg-zinc-950">
                        <h2 class="text-3xl font-black italic accent uppercase tracking-tighter mb-2 text-center text-[#cae962]">ANIME<span class="text-white">MAX</span></h2>
                        <p class="text-[10px] text-zinc-500 uppercase tracking-widest text-center mb-8">Nieuw cloud-profiel aanmaken</p>
                        <div class="space-y-4">
                            <input type="email" id="auth-email" class="w-full bg-zinc-900 border border-white/5 p-4 rounded-xl outline-none focus:border-[#cae962] text-white font-bold text-xs" placeholder="E-mailadres">
                            <input type="text" id="auth-username" class="w-full bg-zinc-900 border border-white/5 p-4 rounded-xl outline-none focus:border-[#cae962] text-white font-bold text-xs" placeholder="Gebruikersnaam">
                            <input type="password" id="auth-password" class="w-full bg-zinc-900 border border-white/5 p-4 rounded-xl outline-none focus:border-[#cae962] text-white font-bold text-xs" placeholder="Wachtwoord (min. 6)">
                            <button onclick="handleAuth('reg')" class="bg-[#cae962] text-black font-black py-4 rounded-xl w-full text-xs uppercase tracking-widest hover:bg-lime-400 transition font-bold font-bold">Account Aanmaken</button>
                            <button onclick="handleGoogleLogin()" class="bg-white text-black font-black py-4 rounded-xl w-full text-xs uppercase tracking-widest flex items-center justify-center gap-2 mt-4 hover:bg-zinc-200 transition"><i class="fa-brands fa-google"></i> Google</button>
                            <p class="text-center text-xs text-zinc-500 mt-4">Al een account? <button onclick="showLoginPage('login')" class="text-[#cae962] font-bold hover:underline">Inloggen</button></p>
                        </div>
                    </div>`;
            } else if (mode === 'forgot') {
                main.innerHTML = `
                    <div class="max-w-md mx-auto mt-16 p-8 card border border-white/5 shadow-2xl animate-fade-in bg-zinc-950">
                        <h2 class="text-3xl font-black italic accent uppercase tracking-tighter mb-2 text-center text-[#cae962]">Wachtwoord Herstellen</h2>
                        <p class="text-[10px] text-zinc-500 uppercase tracking-widest text-center mb-8">Ontvang een herstellink</p>
                        <div class="space-y-4">
                            <input type="text" id="auth-reset-input" class="w-full bg-zinc-900 border border-white/5 p-4 rounded-xl outline-none focus:border-[#cae962] text-white font-bold text-xs" placeholder="Gebruikersnaam of E-mailadres">
                            <button onclick="handleForgotPassword()" class="bg-[#cae962] text-black font-black py-4 rounded-xl w-full text-xs uppercase tracking-widest hover:bg-lime-400 transition font-bold font-bold">Verstuur herstellink</button>
                            <p class="text-center text-xs text-zinc-500 mt-4"><button onclick="showLoginPage('login')" class="text-[#cae962] font-bold hover:underline"><i class="fa-solid fa-arrow-left"></i> Terug naar login</button></p>
                        </div>
                    </div>`;
            } else {
                // Must be <input type="text"> so plain usernames (e.g. Kozjo09) can submit without HTML5 email validation error prompts!
                main.innerHTML = `
                    <div class="max-w-md mx-auto mt-16 p-8 card border border-white/5 shadow-2xl animate-fade-in bg-zinc-950">
                        <h2 class="text-3xl font-black italic accent uppercase tracking-tighter mb-2 text-center text-[#cae962]">ANIME<span class="text-white">MAX</span></h2>
                        <p class="text-[10px] text-zinc-500 uppercase tracking-widest text-center mb-8">Inloggen</p>
                        <div class="space-y-4">
                            <input type="text" id="auth-email" class="w-full bg-zinc-900 border border-white/5 p-4 rounded-xl outline-none focus:border-[#cae962] text-white font-bold text-xs" placeholder="E-mailadres of Gebruikersnaam">
                            <input type="password" id="auth-password" class="w-full bg-zinc-900 border border-white/5 p-4 rounded-xl outline-none focus:border-[#cae962] text-white font-bold text-xs" placeholder="Wachtwoord">
                            <div class="text-right">
                                <button onclick="showLoginPage('forgot')" class="text-zinc-500 text-xs hover:text-white transition">Wachtwoord vergeten?</button>
                            </div>
                            <button onclick="handleAuth('login')" class="bg-[#cae962] text-black font-black py-4 rounded-xl w-full text-xs uppercase tracking-widest hover:bg-lime-400 transition font-bold font-bold font-bold">Inloggen</button>
                            <button onclick="handleGoogleLogin()" class="bg-white text-black font-black py-4 rounded-xl w-full text-xs uppercase tracking-widest flex items-center justify-center gap-2 mt-4 hover:bg-zinc-200 transition"><i class="fa-brands fa-google"></i> Google</button>
                            <p class="text-center text-xs text-zinc-500 mt-4">Nieuw hier? <button onclick="showLoginPage('register')" class="text-[#cae962] font-bold hover:underline">Registreren</button></p>
                        </div>
                    </div>`;
            }
        }
        window.showLoginPage = showLoginPage;

        window.showResetPasswordView = function() {
            document.getElementById('app-header').classList.add('hidden');
            document.getElementById('app-navigation').classList.add('hidden');
            const main = document.getElementById('content');
            if(!main) return;
            main.innerHTML = `
                <div class="max-w-md mx-auto mt-16 p-8 card border border-white/5 shadow-2xl animate-fade-in bg-zinc-950">
                    <h2 class="text-3xl font-black italic accent uppercase tracking-tighter mb-2 text-center text-[#cae962]">Nieuw Wachtwoord</h2>
                    <p class="text-[10px] text-zinc-500 uppercase tracking-widest text-center mb-8">Stel een nieuw wachtwoord in</p>
                    <div class="space-y-4">

        window.loadAllProviders = async function(anilistId) {
            if (anivexaEpisodesCache[anilistId]) return anivexaEpisodesCache[anilistId];
            let allProviders = [];
            try {
                const resAnivexa = await fetchWithCorsFallback(`${ANIVEXA_BASE}/episodes/${anilistId}`);
                if (resAnivexa.ok) {
                    const parsedAnivexa = normalizeApiProviders(await resAnivexa.json(), 'anivexa');
                    if (parsedAnivexa.length > 0) allProviders = allProviders.concat(parsedAnivexa);
                }
            } catch (e) {
                console.error("Anivexa API error:", e);
            }
            if (allProviders.length === 0) {
                const fallbackAnivexaProviders = ["animepahe", "allmanga", "reanime", "anikoto", "animegg", "anineko"];
                fallbackAnivexaProviders.forEach(provider => {
                    allProviders.push({ id: `anivexa-${provider}`, api: 'anivexa', provider, sub: [], dub: [] });
                });
            }
            anivexaEpisodesCache[anilistId] = allProviders;
            return allProviders;
        };

        window.setupNativePlayer = function(m3u8Url, subtitles = []) {
            const video = document.getElementById('native-player');
            if (!video) return;

            if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
            video.innerHTML = ''; 

            // Save stream URL globally for VLC/copy actions
            window.currentM3u8Url = m3u8Url;
            
            // Dynamically update the VLC button deep link to bypass browser pop-up blocks
            const vlcBtn = document.getElementById('vlc-btn');
            if (vlcBtn) {
                const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
                if (isMobile) {
                    vlcBtn.href = "vlc-x-callback://x-callback-url/stream?url=" + encodeURIComponent(m3u8Url);
                } else {
                    vlcBtn.href = "vlc://" + m3u8Url;
                }
            }

            if (subtitles && subtitles.length > 0) {
                subtitles.forEach(sub => {
                    const subUrl = sub.file || sub.url;
                    if(subUrl) {
                        const track = document.createElement('track');
                        track.kind = 'captions'; 
                        track.label = sub.label || sub.lang || sub.language || 'Sub';
                        track.srclang = (track.label).substring(0, 2).toLowerCase(); 
                        track.src = subUrl;
                        if (track.label.toLowerCase().includes('eng') || track.label.toLowerCase().includes('nl')) track.default = true;
                        video.appendChild(track);
                    }
                });
            }

            function initHlsStream(streamUrl) {
                if (Hls.isSupported()) {
                    hlsInstance = new Hls({
                        maxBidirectionalLinkDelay: 1.5,
                        xhrSetup: function(xhr, url) { 
                            xhr.withCredentials = false; 
                        }
                    });
                    hlsInstance.loadSource(streamUrl);
                    hlsInstance.attachMedia(video);
                    hlsInstance.on(Hls.Events.MANIFEST_PARSED, function() { restoreVideoPositionAndPlay(video); });
                    hlsInstance.on(Hls.Events.ERROR, function(event, data) {
                        if (data.fatal) {
                            switch(data.type) {
                                case Hls.ErrorTypes.NETWORK_ERROR:
                                    console.warn("Direct stream failed.");
                                    window.showToast("Stream netwerkfout. Probeer een andere server of open in VLC.", "error");
                                    break;
                                case Hls.ErrorTypes.MEDIA_ERROR:
                                    hlsInstance.recoverMediaError();
                                    break;
                                default:
                                    hlsInstance.destroy();
                                    break;
                            }
                        }
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = streamUrl;
                    video.addEventListener('loadedmetadata', function() { restoreVideoPositionAndPlay(video); });
                }
            }

            const isM3u8 = /\.m3u8?(\?|$)/i.test(m3u8Url);
            if (isM3u8) {
                const proxiedUrl = proxyM3u8(m3u8Url);
                initHlsStream(proxiedUrl);
            } else {
                // Play standard direct mp4/mkv files natively in HTML5 video tag!
                video.src = m3u8Url;
                video.addEventListener('loadedmetadata', function() { restoreVideoPositionAndPlay(video); });
            }

            video.ontimeupdate = () => { window.updateProgressUI(video.currentTime, video.duration); };
        };

        window.openInVLC = function() {

                window.showToast("MegaPlay is een ingesloten video en kan niet geopend worden in VLC. Schakel over naar een Direct/HLS server!", "error");

            if (!window.currentM3u8Url) {

        function restoreVideoPositionAndPlay(video) {
            const ar = app.recent.find(r => r && r.id == app.id && r.ep == app.ep);
            if (ar && ar.time > 0 && ar.time < (video.duration - 5)) {
                video.currentTime = ar.time;

        }

        window.loadAnivexaAndRenderServers = async function(anilistId, targetEp, mode) {
            const embedContainer = document.getElementById('anivexa-embeds-container');
            const restContainer = document.getElementById('anivexa-rest-container');
            
            if (!embedContainer || !restContainer) return;
            embedContainer.innerHTML = '<span class="text-[9px] text-zinc-500"><i class="fa-solid fa-spinner animate-spin"></i> Bezig...</span>';
            restContainer.innerHTML = '<span class="text-[9px] text-zinc-500"><i class="fa-solid fa-spinner animate-spin"></i> Bezig...</span>';

            const providers = await loadAllProviders(anilistId);
            embedContainer.innerHTML = ''; restContainer.innerHTML = '';
            let validServers = [];
            
            providers.forEach(p => {
                 const epList = p[mode] || [];
                 const hasEp = epList.find(e => e.number == targetEp || e.episode == targetEp);
                 if (hasEp || (p.api === 'anivexa' && epList.length === 0)) {
                      validServers.push(p);
                 }
            });

            // Always add MegaPlay as available embed source
            const mBtn = document.createElement('button');
            mBtn.className = `px-3 py-1.5 rounded-lg text-[9px] font-black uppercase transition-all whitespace-nowrap ${app.server === 'megaplay' ? 'bg-[#cae962] text-black font-bold' : 'bg-zinc-800 text-zinc-400 hover:bg-zinc-700'}`;
            mBtn.innerHTML = `<i class="fa-solid fa-play mr-1"></i> MEGAPLAY`;
            mBtn.onclick = () => window.setServer('megaplay');
            embedContainer.appendChild(mBtn);

            validServers.forEach(p => {
                const btn = document.createElement('button');
                const srvName = p.id;
                const isActive = app.server === srvName;
                btn.className = `px-3 py-1.5 rounded-lg text-[9px] font-black uppercase transition-all whitespace-nowrap ${isActive ? 'bg-[#cae962] text-black font-bold' : 'bg-zinc-800 text-zinc-400 hover:bg-zinc-700'}`;
                btn.innerHTML = `<i class="fa-solid fa-server mr-1"></i> ${p.provider.toUpperCase()}`;
                btn.onclick = () => window.setServer(srvName);

                if (EMBED_PROVIDERS.includes(p.provider.toLowerCase())) {
                    embedContainer.appendChild(btn);
                } else {
                    restContainer.appendChild(btn);
                }
            });
            return validServers;
        };

        window.loadStreamAndPlay = async function(anilistId, targetEp, mode, serverId) {
            const iframeEl = document.getElementById('player');
            const nativeEl = document.getElementById('native-player-container');

            if (serverId === 'megaplay') {
                iframeEl.src = `https://megaplay.buzz/stream/ani/${anilistId}/${targetEp}/${mode}`;
                iframeEl.classList.remove('hidden'); iframeEl.classList.add('block');
                nativeEl.classList.add('hidden'); nativeEl.classList.remove('block');
                if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
                return;
            }

            const providers = await loadAllProviders(anilistId);
            const pObj = providers.find(p => p.id === serverId);
            if (!pObj) return;

            let fetchUrl = `${ANIVEXA_BASE}/watch/${pObj.provider}/${anilistId}/${mode}/${pObj.provider}-${targetEp}`;
            try {
                const res = await fetchWithCorsFallback(fetchUrl);
                const data = await res.json();
                let streamData = data.streams ? data : (data.results || data);
                
                if (streamData && streamData.streams && streamData.streams.length > 0) {
                    let best = streamData.streams.find(s => s.quality === '1080p' || s.quality === 'auto' || s.quality === '720p') || streamData.streams[0];

                    if (best.embed || best.type === 'embed' || EMBED_PROVIDERS.includes(pObj.provider.toLowerCase())) {
                        iframeEl.src = best.embed || best.url;
                        iframeEl.classList.remove('hidden'); iframeEl.classList.add('block');
                        nativeEl.classList.add('hidden'); nativeEl.classList.remove('block');
                        if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
                    } else {
                        iframeEl.classList.add('hidden'); iframeEl.classList.remove('block'); iframeEl.src = ""; 
                        nativeEl.classList.remove('hidden'); nativeEl.classList.add('block');
                        
                        // Set current stream URL
                        window.currentM3u8Url = best.url;
                        const vlcBtn = document.getElementById('vlc-btn');
                        if (vlcBtn) {
                            const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
                            if (isMobile) {
                                vlcBtn.href = "vlc-x-callback://x-callback-url/stream?url=" + encodeURIComponent(best.url);
                            } else {
                                vlcBtn.href = "vlc://" + best.url;
                            }
                        }
                        
                        window.setupNativePlayer(best.url, streamData.subtitles || []);
                    }
                } else {
                    window.showToast("Stream offline of onbeschikbaar.", "error");
                }
            } catch (err) {
                console.error(err);
            }
        };

            const epsTotal = parseInt(epsText) || 12;

            if (statusVal === "Not Watching") {
                app.xmlLib = app.xmlLib.filter(i => i.id != activeModalId);
            } else {
                if (item) {
                    item.status = statusVal;
                } else {
                    app.xmlLib.push({ id: activeModalId.toString(), title, status: statusVal, progress: 0, episodes: epsTotal, coverImage: cover });

        };

        // =========================================================================
        // VIDEO TRACKING, AUTO-NEXT, AND HISTORY
        // =========================================================================
        window.saveRecent = function(id, title, img, ep) {
            let rec = app.recent.filter(i => i && i.id != id);
            rec.unshift({ id, title, img, ep, time: currentPlaybackTime || 0, duration: currentDuration || 0, ts: Date.now() });
            app.recent = rec.slice(0, 12);
            saveCloudDataDebounced();
        };

        window.saveCurrentVideoTime = function() {
            if (app.view !== 'watch' || !app.id) return;
            const cur = app.recent.find(i => i && i.id == app.id);
            window.saveRecent(app.id, cur ? cur.title : 'Anime', cur ? cur.img : '', app.ep);
        };

        window.updateProgressUI = function(seconds, duration) {
            currentPlaybackTime = parseFloat(seconds);
            if (duration !== undefined && duration > 0) currentDuration = parseFloat(duration);
            
            const timeText = document.getElementById('playback-time-text');
            const percentageText = document.getElementById('playback-progress-percentage');
            if (timeText) timeText.innerText = `${formatDuration(currentPlaybackTime)} / ${formatDuration(currentDuration)}`;
            if (percentageText && currentDuration > 0) {
                const pct = Math.round((currentPlaybackTime / currentDuration) * 100);
                percentageText.innerText = `${pct}%`;
            }

            const isNearEnd = (currentDuration > 10 && currentPlaybackTime >= currentDuration - 2.5);
            if (isNearEnd) {
                if (autoNextTriggered) return;
                autoNextTriggered = true;
                setTimeout(() => { autoNextTriggered = false; }, 8000);
                if (app.autoNext) window.playNextEpisode();
            }
        };

        window.autoUpdateProgressOnEpClick = function(id, title, ep, total, img, customStat = null) {
            let found = false;
            const ex = app.xmlLib.find(i => i && i.id == id);
            let finalStat = customStat ? customStat : (ex ? (ex.status === "Dropped" ? "Dropped" : (ep >= total ? "Watched" : ex.status)) : (ep >= total ? "Watched" : "Watching"));

            app.xmlLib = app.xmlLib.map(i => {
                if (i && i.id == id) { found = true; return { ...i, status: finalStat, progress: parseInt(ep), episodes: total, coverImage: img || i.coverImage }; }
                return i;
            });
            if (!found) app.xmlLib.push({ id: id.toString(), title, status: finalStat, progress: parseInt(ep), episodes: total, coverImage: img });
            
            saveCloudDataDebounced();
            window.syncProgressToAniList(id, ep, finalStat);
        };

        window.playNextEpisode = function() {
            const loc = app.xmlLib.find(i => i && i.id == app.id) || app.recent.find(i => i && i.id == app.id);
            const totalEps = loc ? (loc.episodes || 12) : 12;
            const nextEp = parseInt(app.ep) + 1;

            if (nextEp <= totalEps) {
                window.showToast(`Start aflevering ${nextEp}...`);
                window.autoUpdateProgressOnEpClick(app.id, loc ? loc.title : 'Anime', nextEp, totalEps, loc ? loc.coverImage : '');
                setTimeout(() => { nav('watch', { id: app.id, ep: nextEp }); }, 200);
            } else {
                window.showToast("Laatste aflevering bereikt!", "success");
            }
        };

        function formatDuration(sec) {
            if (!sec || isNaN(sec)) return "0:00";
            const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = Math.floor(sec % 60);
            return h > 0 ? `${h}:${m<10?'0':''}${m}:${s<10?'0':''}${s}` : `${m}:${s<10?'0':''}${s}`;
        }

        window.skipIntroTime = function() {
            currentPlaybackTime += app.skipSeconds;

        // =========================================================================

        window.liveSearch = function(e) {

            grid.innerHTML = '<div class="col-span-full text-center text-[#cae962] text-xs mt-10"><i class="fa-solid fa-circle-notch animate-spin"></i> Zoeken...</div>';
            
            searchTimeout = setTimeout(async () => {
                const res = await gql(`query($s:String){Page(perPage:24){media(type:ANIME,search:$s,sort:POPULARITY_DESC){id title{romaji english}coverImage{large}averageScore}}}`, { s: q });

                                </div>
                                <p class="text-[10px] font-black uppercase truncate text-zinc-400 group-hover:text-white pl-1">${t}</p>

                        <!-- AniList Connection Card -->
                        <div class="card p-8 border border-white/5 text-center space-y-4">
                            <h2 class="font-black uppercase text-sm text-white">AniList Integratie</h2>
                            <div id="anilist-connection-status" class="py-2">
                                <i class="fa-solid fa-spinner animate-spin text-accent"></i>
                            </div>
                            <div class="space-y-2">
                                <button onclick="loginAniListOAuth()" class="w-full bg-[#3db4f2] text-white font-black py-3.5 rounded-xl text-xs uppercase hover:scale-102 transition flex items-center justify-center gap-2"><i class="fa-solid fa-cloud"></i> Connect met AniList</button>
                                <button onclick="loginAniListManualToken()" class="w-full bg-zinc-900 border border-white/10 text-zinc-300 font-bold py-3 rounded-xl text-[10px] uppercase hover:bg-zinc-800 transition">Handmatige Token invoeren</button>
                            </div>
                        </div>
                    </div>`;
                renderAniListConnectionStatus();
            }
            else if (app.view === 'library') {
                main.innerHTML = `
                    <div class="space-y-6">
                        <div class="flex items-center justify-between pb-4 border-b border-white/5"><h2 class="text-2xl font-black text-[#cae962] uppercase italic">Mijn Lijst</h2><span class="text-[10px] text-zinc-500 uppercase font-black">${app.xmlLib.length} items</span></div>
                        <div class="flex gap-2 overflow-x-auto no-scrollbar pb-2">
                            ${['All', 'Watching', 'Watched', 'Dropped', 'Plan to Watch'].map(s => `<button onclick="filterXml('${s}')" class="flex-shrink-0 px-4 py-2 rounded-full text-[10px] font-black uppercase ${app.libraryFilter === s ? 'bg-[#cae962] text-black font-bold' : 'bg-zinc-900 text-zinc-400 border border-white/5'}">${s}</button>`).join('')}
                        </div>
                        <div id="xml-display-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                    </div>`;
                renderLibraryGrid();
            }
            else if (app.view === 'search') {
                main.innerHTML = `
                    <div class="max-w-xl mx-auto mb-10"><input type="text" id="live-search" placeholder="Typ een anime titel..." onkeyup="liveSearch(event)" class="w-full bg-zinc-900 border border-white/10 p-5 rounded-2xl outline-none focus:border-[#cae962] text-white font-bold text-sm shadow-xl"></div>
                    <div id="search-grid" class="grid grid-cols-2 sm:grid-cols-6 gap-4"></div>`;
            }
            else {
                // HOME VIEW WITH SPOTLIGHT HERO AND SCROLLABLE ROW SHELVES
                main.innerHTML = `
                    <div class="space-y-8">
                        <!-- Hero Spotlight Banner -->
                        <div id="hero-spotlight-container" class="relative w-full h-[55vh] md:h-[70vh] rounded-3xl overflow-hidden border border-white/5 shadow-2xl animate-fade-in bg-zinc-950">
                            <div class="absolute inset-0 bg-gradient-to-t from-[#060606] via-[#060606]/30 to-transparent z-10"></div>
                            <div class="absolute inset-0 bg-gradient-to-r from-[#060606]/90 via-transparent to-transparent z-10"></div>
                            <img id="spotlight-bg" class="w-full h-full object-cover brightness-[0.5] select-none">
                            <div class="absolute bottom-10 left-6 md:left-12 z-20 max-w-xl space-y-4">
                                <span class="px-2.5 py-1 rounded bg-[#cae962]/20 text-[#cae962] text-[9px] font-black uppercase tracking-wider font-bold">SPOTLIGHT</span>
                                <h1 id="spotlight-title" class="text-3xl md:text-5xl font-black italic uppercase tracking-tighter leading-none text-white"></h1>
                                <p id="spotlight-desc" class="text-zinc-400 text-xs md:text-sm line-clamp-3 leading-relaxed"></p>
                                <div class="flex gap-4">
                                    <button id="spotlight-play-btn" class="bg-white text-black font-black px-6 py-3 rounded-xl text-xs uppercase flex items-center gap-2 hover:scale-105 transition-all shadow-lg font-bold"><i class="fa-solid fa-play"></i> Afspelen</button>
                                    <button id="spotlight-info-btn" class="bg-zinc-900/90 text-white font-black px-6 py-3 rounded-xl text-xs uppercase flex items-center gap-2 border border-white/10 hover:bg-zinc-800 transition-all font-bold"><i class="fa-solid fa-info-circle"></i> Meer Info</button>
                                </div>
                            </div>
                        </div>

                        <!-- Horizontal Scroll Shelves -->
                        <div id="home-shelves" class="space-y-12">
                            <!-- Filled dynamically by AniList and Jikan calls -->
                        </div>
                    </div>`;

                // Load Hero Spotlight content
                gql(`query{Page(perPage:1){media(type:ANIME,sort:TRENDING_DESC){id title{romaji english}bannerImage coverImage{extraLarge large}description}}}`).then(res => {
                    if (res && res.data && res.data.Page.media.length) {
                        const m = res.data.Page.media[0];
                        const title = app.lang === 'english' ? (m.title.english || m.title.romaji) : m.title.romaji;
                        document.getElementById('spotlight-bg').src = m.bannerImage || m.coverImage.extraLarge || m.coverImage.large;
                        document.getElementById('spotlight-title').innerText = title;
                        document.getElementById('spotlight-desc').innerHTML = m.description || "";
                        document.getElementById('spotlight-play-btn').onclick = () => nav('watch', { id: m.id, ep: 1 });
                        document.getElementById('spotlight-info-btn').onclick = () => openDetailsModal(m.id);
                    }
                });

                // Load and render all rows of cards
                loadHomeDashboardRows();
            }
        }

        async function loadHomeDashboardRows() {
            const container = document.getElementById('home-shelves');
            if (!container) return;

            // Row 1: Continue Watching (from history)
            if (app.recent && app.recent.length > 0) {
                // Fetch real-time up-to-date and next episode counts
                const ids = app.recent.map(r => parseInt(r.id)).filter(id => !isNaN(id));
                let latestEpMap = {};
                if (ids.length > 0) {
                    try {
                        const gqlRes = await gql(`query($ids:[Int]){Page(perPage:50){media(id_in:$ids,type:ANIME,isAdult:false){id episodes status nextAiringEpisode{episode}}}}`, { ids });
                        if (gqlRes && gqlRes.data && gqlRes.data.Page.media) {
                            gqlRes.data.Page.media.forEach(m => {
                                let total = m.episodes || 12;
                                if (m.status === 'RELEASING' && m.nextAiringEpisode) {
                                    total = m.nextAiringEpisode.episode - 1;
                                }
                                latestEpMap[m.id] = total;
                            });
                        }
                    } catch (e) {
                        console.error("Error fetching progress for up-to-date tags:", e);
                    }
                }

                // Render Continue Watching track with up-to-date alerts
                let recentShelfHtml = `
                    <div class="space-y-4">
                        <h2 class="text-lg font-black uppercase tracking-wider flex items-center gap-2">
                            <span class="w-1.5 h-6 bg-[#cae962] rounded-full"></span> Verder Kijken
                        </h2>
                        <div id="shelf-recent" class="shelf-container no-scrollbar">
                            ${app.recent.map(r => {
                                if (!r) return '';
                                const p = (r.time > 0 && r.duration > 0) ? Math.round((r.time / r.duration) * 100) : 0;
                                const latestAvailable = latestEpMap[r.id] || r.ep || 12;
                                const isUpToDate = r.ep >= latestAvailable;

                                let textBadge = '';
                                if (isUpToDate) {
                                    textBadge = `<span class="absolute top-2 left-2 bg-emerald-950/90 border border-emerald-500/40 text-emerald-400 text-[8px] font-black px-2 py-0.5 rounded shadow flex items-center gap-1"><i class="fa-solid fa-check"></i> UP-TO-DATE</span>`;
                                } else {
                                    textBadge = `<span class="absolute top-2 left-2 bg-[#cae962] text-black text-[8px] font-black px-2 py-0.5 rounded shadow flex items-center gap-1 font-bold animate-pulse"><i class="fa-solid fa-bell"></i> EP ${parseInt(r.ep)+1} OUT!</span>`;
                                }

                                return `
                                    <div onclick="nav('watch', {id:'${r.id}', ep:${r.ep}})" class="flex-shrink-0 w-36 sm:w-44 cursor-pointer group select-none relative card p-2 bg-zinc-950/80">
                                        <div class="aspect-video rounded-lg bg-zinc-900 border border-white/5 relative overflow-hidden mb-2">
                                            <img src="${r.img}" class="w-full h-full object-cover opacity-60 group-hover:scale-105 transition-all duration-500">
                                            <span class="absolute bottom-2 left-2 bg-black/85 px-1.5 py-0.5 rounded text-[8px] font-black text-[#cae962]">EP ${r.ep}</span>
                                            ${textBadge}
                                            ${p > 0 ? `<div class="absolute bottom-0 left-0 w-full h-1 bg-white/10"><div class="h-full bg-[#cae962]" style="width: ${p}%"></div></div>` : ''}
                                        </div>
                                        <p class="text-[9px] font-black uppercase truncate text-zinc-400 group-hover:text-white pl-1">${r.title}</p>
                                    </div>`;
                            }).join('')}
                        </div>
                    </div>`;
                container.innerHTML += recentShelfHtml;
            }

            // Row 2: Airing Today / New Releases (from schedule)
            try {
                const nowSec = Math.floor(Date.now() / 1000);
                const query = `query{Page(page:1,perPage:20){airingSchedules(airingAt_greater:${nowSec},airingAt_lesser:${nowSec + 4 * 86400},sort:TIME){media{id title{romaji english}coverImage{large}averageScore}episode}}}`;
                const res = await fetch(ANILIST_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });
                const json = await res.json();
                if (json.data && json.data.Page.airingSchedules) {
                    const mappedList = json.data.Page.airingSchedules.map(item => ({
                        ...item.media,
                        nextAiringEpisode: { episode: item.episode }
                    }));
                    container.innerHTML += renderShelf("Nieuwe Releases (Airing)", mappedList, "shelf-airing", true);
                }
            } catch (e) {
                console.error("Failed to load airing row:", e);
            }

            // Row 3: Trending Now
            const trendingRes = await gql(`query{Page(perPage:12){media(type:ANIME,sort:TRENDING_DESC){id title{romaji english}coverImage{large}averageScore}}}`);
            if (trendingRes && trendingRes.data) {
                container.innerHTML += renderShelf("Nu Populair", trendingRes.data.Page.media, "shelf-trending");
            }

            // Row 4: Popular Shows
            const popularRes = await gql(`query{Page(perPage:12){media(type:ANIME,sort:POPULARITY_DESC){id title{romaji english}coverImage{large}averageScore}}}`);
            if (popularRes && popularRes.data) {
                container.innerHTML += renderShelf("Klassiekers & Favorieten", popularRes.data.Page.media, "shelf-popular");
            }
        }

        function renderShelf(title, list, elementId, isAiring = false) {
            if (!list || list.length === 0) return '';
            return `
                <div class="space-y-4 animate-fade-in">
                    <h2 class="text-lg font-black uppercase tracking-wider flex items-center gap-2">
                        <span class="w-1.5 h-6 bg-[#cae962] rounded-full"></span> ${title}
                    </h2>
                    <div id="${elementId}" class="shelf-container no-scrollbar">
                        ${list.map(m => {
                            if (!m) return '';
                            const t = app.lang === 'english' ? (m.title.english || m.title.romaji) : m.title.romaji;
                            const cover = m.coverImage?.large || m.img || 'https://images.unsplash.com/photo-1578632767115-351597cf2477?q=80&w=150';
                            
                            let badge = '';
                            if (isAiring && m.nextAiringEpisode) {
                                badge = `<span class="absolute top-2 left-2 bg-[#cae962] text-black text-[8px] font-black px-2 py-0.5 rounded shadow font-bold">EPISODE ${m.nextAiringEpisode.episode}</span>`;
                            } else if (m.averageScore) {
                                badge = `<span class="absolute top-2 left-2 bg-black/80 text-accent text-[8px] font-black px-1.5 py-0.5 rounded shadow"><i class="fa-solid fa-star text-[7px] mr-1 text-[#cae962]"></i>${m.averageScore/10}</span>`;
                            }
                            
                            return `
                                <div onclick="openDetailsModal('${m.id}')" class="flex-shrink-0 w-36 sm:w-44 cursor-pointer group select-none relative">
                                    <div class="aspect-[2/3] rounded-xl overflow-hidden mb-2 border border-white/5 relative bg-zinc-900">
                                        <img src="${cover}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" loading="lazy">
                                        ${badge}
                                        <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-end p-3">
                                            <span class="w-8 h-8 rounded-full bg-[#cae962] text-black flex items-center justify-center text-xs font-black shadow-lg"><i class="fa-solid fa-play"></i></span>
                                        </div>
                                    </div>
                                    <p class="text-[10px] font-black uppercase truncate text-zinc-400 group-hover:text-white pl-1">${t}</p>
                                </div>`;
                        }).join('')}
                    </div>
                </div>`;
        }

        async function renderAniListConnectionStatus() {
            const el = document.getElementById('anilist-connection-status');
            if (!el) return;
            if (app.anilistToken) {
                const res = await gql(`query { Viewer { name avatar { large } } }`);
                if (res && res.data && res.data.Viewer) {
                    el.innerHTML = `
                        <div class="flex items-center gap-3 bg-zinc-900/60 p-4 rounded-xl border border-white/5 max-w-xs mx-auto">
                            <img src="${res.data.Viewer.avatar.large}" class="w-12 h-16 rounded-lg object-cover border border-white/10 shadow-lg">
                            <div class="text-left">
                                <p class="text-[9px] font-black text-emerald-400 uppercase">Gekoppeld</p>
                                <h3 class="text-xs font-black text-white truncate max-w-[120px]">${res.data.Viewer.name}</h3>
                                <button onclick="disconnectAniList()" class="text-red-500 text-[10px] font-bold uppercase hover:underline mt-1">Ontkoppelen</button>
                            </div>
                        </div>`;
                    return;
                }
            }
            el.innerHTML = `
                <div class="text-center py-2">
                    <span class="text-xs text-zinc-500 uppercase font-black">Niet verbonden</span>
                </div>`;
        }

        window.renderLibraryGrid = function() {
            const grid = document.getElementById('xml-display-grid'); if (!grid) return;
            let fXml = app.libraryFilter === 'All' ? app.xmlLib : app.xmlLib.filter(i => i && (app.libraryFilter === 'Watched' ? (i.status === 'Watched' || i.status === 'Completed') : i.status === app.libraryFilter));

            if (!fXml.length) return grid.innerHTML = `<p class="col-span-full text-xs uppercase font-black text-center text-zinc-600 py-12">Leeg in categorie ${app.libraryFilter}</p>`;
            
            grid.innerHTML = '';
            fXml.forEach(item => {
                if (!item) return;
                const dStat = item.status === 'Watched' ? 'COMPLETED' : item.status.toUpperCase();
                grid.innerHTML += `
                    <div id="lib-card-${item.id}" data-id="${item.id}" class="card p-4 flex flex-col sm:flex-row justify-between gap-4 border border-white/5 animate-fade-in bg-zinc-950">
                        <div class="flex gap-4 items-center flex-1 min-w-0 cursor-pointer" onclick="openDetailsModal('${item.id}')">
                            <img src="${item.coverImage || 'https://images.unsplash.com/photo-1578632767115-351597cf2477?q=80&w=150'}" class="w-12 h-16 object-cover rounded-lg bg-zinc-900 border border-white/5">
                            <div class="truncate pr-4 flex-1">
                                <p class="text-white truncate font-bold text-sm mb-1">${item.title}</p>
                                <div class="flex items-center gap-2"><span class="text-[9px] bg-zinc-900 text-accent px-2 py-0.5 rounded font-black">${dStat}</span><span class="text-[9px] text-zinc-500 font-bold uppercase">Prog: <span id="progress-val-${item.id}">${item.progress}</span> / <span id="eps-total-${item.id}">${item.episodes || '?'}</span></span></div>
                            </div>
                        </div>
                        <div class="flex items-center gap-2 self-end sm:self-auto">
                            <button onclick="nav('watch', {id:'${item.id}', ep:${item.progress || 1}})" class="bg-[#1a1a1a] hover:bg-[#cae962] hover:text-black px-4 py-2.5 rounded-xl text-xs text-zinc-400 font-bold transition-colors"><i class="fa-solid fa-play"></i> Kijk</button>
                            <button onclick="quickIncrement('${item.id}')" class="bg-[#1a1a1a] hover:bg-zinc-800 px-4 py-2.5 rounded-xl text-xs text-zinc-400 font-black">+1 Ep</button>
                            <button onclick="deleteLocalItem('${item.id}')" class="bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white p-3 rounded-xl text-xs transition-colors"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>`;
            });
        };

        window.quickIncrement = function(id) {
            let item = app.xmlLib.find(i => i && i.id == id);
            if (item) {
                let current = parseInt(item.progress || 0);
                let total = parseInt(item.episodes || 12);
                if (current < total) {
                    item.progress = current + 1;
                    if (item.progress >= total) item.status = "Watched";
                    saveCloudDataDebounced();
                    renderLibraryGrid();
                    window.syncProgressToAniList(id, item.progress, item.status);
                    window.showToast(`Ep verhoogd naar ${item.progress}`);
                } else {
                    window.showToast("Laatste ep al bereikt!", "error");
                }
            }
        };

        window.deleteLocalItem = function(id) {
            window.showConfirm("Verwijderen", "Weet je zeker dat je dit uit de lijst wilt verwijderen?", () => {
                app.xmlLib = app.xmlLib.filter(i => i.id != id); 
                saveCloudDataDebounced(); 
                renderLibraryGrid();
            });
        };

        window.removeRecentAnime = function(e, id) {
            if(e) { e.stopPropagation(); e.preventDefault(); }
            window.showConfirm("Verwijderen", "Verwijderen uit geschiedenis?", () => { 
                app.recent = app.recent.filter(r => r && r.id != id); 
                saveCloudDataDebounced(); 
                window.showToast("Verwijderd!"); 
                render(); 
            });
        };

        window.checkAudioAvailabilityAndPlay = function(targetMode) { 
            app.mode = targetMode; 
            saveCloudDataDebounced(); 
            render(); 
        };

        window.handleAuth = async function(type) {
            const p = document.getElementById('auth-password').value.trim();
            let email = document.getElementById('auth-email').value.trim();
            
            if (!email || !p) return window.showToast("Vul alles in!", "error");

            if (type === 'reg') {
                const u = document.getElementById('auth-username').value.trim();
                if(!u) return window.showToast("Vul een gebruikersnaam in!", "error");
                const { data, error } = await sb.auth.signUp({ email, password: p });
                if (error) return window.showToast(error.message, "error");
                app.user = u;
                if (data.user) await sb.from('anime_users').insert([{ id: data.user.id, username: u, watchlist: [], recent: [] }]);
                window.showToast("Succesvol geregistreerd! Log nu in.");
                showLoginPage('login');
            } else {
                if (!email.includes('@')) email = `${email.toLowerCase()}@animemax.local`;
                const { data, error } = await sb.auth.signInWithPassword({ email, password: p });
                if (error) return window.showToast("Onjuiste gegevens.", "error");
                sessionData = data.session;
                await loadCloudData();
            }
        };

        window.onload = async () => {
            try {
                sb = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                
                // Playwright tests specific URL search trigger
                const isPlaywrightTest = window.location.search.includes('test=true');
                if (isPlaywrightTest) {
                    showLoginPage('login');
                    return;
                }

                const { data: { session } } = await sb.auth.getSession();
                if (session) { sessionData = session; restoreStateFromUrl(); await loadCloudData(); } 
                else { showLoginPage('login'); }
            } catch(e) { console.error(e); showLoginPage('login'); }
        };
    </script>
</body>
</html>
