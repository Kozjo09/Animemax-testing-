<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="k-session" content="">
    <title>AnimeMax Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- HLS.js for native m3u8 streaming -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <!-- reCAPTCHA v3 voor de nieuwe API calls -->
    <script src="https://www.google.com/recaptcha/api.js?render=6LfzHX8sAAAAAN70WElpj4nM__wxhllZQNZCAFGb"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&display=swap');
        body { 
            background: #060606; 
            color: #ffffff; 
            font-family: 'Outfit', sans-serif; 
            overflow-x: hidden; 
            -webkit-tap-highlight-color: transparent; 
        }
        .accent { color: #cae962; } /* Lime Green Theme */
        .bg-accent { background-color: #cae962; color: #000; }
        .text-accent-glow { text-shadow: 0 0 10px rgba(202, 233, 98, 0.4); }
        .glass-header { 
            background: rgba(6, 6, 6, 0.2); 
            backdrop-filter: blur(0px); 
            -webkit-backdrop-filter: blur(0px); 
            transition: all 0.4s ease-in-out; 
        }
        .glass-header.scrolled { 
            background: rgba(10, 10, 10, 0.95); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
        }
        .card { 
            background: #111111; 
            border-radius: 12px; 
            border: 1px solid rgba(255, 255, 255, 0.03); 
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); 
        }
        .card:hover { 
            transform: translateY(-4px); 
            border-color: rgba(202, 233, 98, 0.3); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); 
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Horizontal Scroll Shelf */
        .shelf-container {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            scroll-behavior: smooth;
            padding-bottom: 16px;
        }

        /* Toggle Switch */
        .toggle-checkbox:checked + .toggle-bg { background-color: #cae962; }
        .toggle-checkbox:checked + .toggle-bg .toggle-dot { transform: translateX(100%); background-color: #000000; }
        
        /* Toast Container */
        #toast-container {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 380px;
            z-index: 10000;
            pointer-events: none;
        }

        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-toast { animation: slideDown 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Custom Video Player Styling */
        video::cue {
            background-color: transparent;
            color: white;
            text-shadow: 2px 2px 4px #000, -2px -2px 4px #000, 2px -2px 4px #000, -2px 2px 4px #000;
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
        }
    </style>
</head>
<body class="pb-32 relative">

    <div id="toast-container" class="flex flex-col gap-2"></div>

    <!-- Confirm Modal -->
    <div id="confirm-modal" class="fixed inset-0 bg-black/90 backdrop-blur-sm z-[10000] hidden items-center justify-center p-4">
        <div class="bg-[#121212] border border-white/5 p-6 rounded-2xl max-w-sm w-full shadow-2xl">
            <h3 id="confirm-title" class="text-lg font-black uppercase tracking-wider mb-2">Bevestigen</h3>
            <p id="confirm-message" class="text-zinc-400 text-xs leading-relaxed mb-6"></p>
            <div class="flex gap-3">
                <button id="confirm-cancel-btn" class="flex-1 bg-zinc-900 border border-white/5 py-3 rounded-xl text-xs font-black uppercase">Annuleren</button>
                <button id="confirm-ok-btn" class="flex-1 bg-[#cae962] text-black py-3 rounded-xl text-xs font-black uppercase font-bold">Bevestigen</button>
            </div>
        </div>
    </div>

    <!-- Lime-Green Glass Header -->
    <header id="app-header" class="fixed top-0 left-0 right-0 z-50 glass-header p-4 lg:px-10 hidden">
        <div class="flex items-center justify-between max-w-7xl mx-auto">
            <div class="flex items-center gap-6 lg:gap-12">
                <button onclick="nav('home')" class="text-2xl lg:text-3xl font-black italic uppercase tracking-tighter text-[#cae962] transition-transform hover:scale-105">ANIME<span class="text-white">MAX</span></button>
                <nav class="hidden md:flex items-center gap-6 text-[11px] font-black uppercase tracking-widest text-zinc-400">
                    <button onclick="nav('home')" class="hover:text-white transition-colors animate-fade-in" id="head-nav-home">Home</button>
                    <button onclick="nav('library')" class="hover:text-white transition-colors animate-fade-in" id="head-nav-library">Mijn Lijst</button>
                    <button onclick="nav('recent')" class="hover:text-white transition-colors animate-fade-in" id="head-nav-recent">Verder Kijken</button>
                </nav>
            </div>
            <div class="flex gap-4 items-center">
                <button onclick="nav('search')" class="w-10 h-10 rounded-full bg-zinc-900/60 flex items-center justify-center border border-white/5 hover:border-[#cae962]/40 text-zinc-300 hover:text-[#cae962] transition-all duration-300" title="Zoeken"><i class="fa-solid fa-search text-xs"></i></button>
                <button onclick="nav('profile')" id="prof-btn" class="w-10 h-10 rounded-full bg-zinc-900/60 flex items-center justify-center border border-white/5 hover:border-[#cae962]/40 text-zinc-300 hover:text-white transition-all duration-300" title="Profiel & Instellingen">
                    <i class="fa-solid fa-user-astronaut"></i>
                </button>
                <button onclick="logout()" class="w-10 h-10 rounded-full bg-red-950/20 hover:bg-red-700 border border-red-500/10 hover:border-transparent flex items-center justify-center text-red-400 hover:text-white transition-all duration-300" title="Uitloggen"><i class="fa-solid fa-sign-out-alt text-xs"></i></button>
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main id="content" class="p-4 pt-24 max-w-7xl mx-auto min-h-[60vh]">
        <div class="text-center py-24" id="main-loader">
            <i class="fa-solid fa-circle-notch animate-spin text-4xl text-[#cae962] mb-4"></i>
            <p class="text-xs uppercase tracking-widest text-zinc-500 animate-pulse">Laden en cloud-database verbinden...</p>
        </div>
    </main>

    <!-- Bottom Navigation for Mobile -->
    <nav id="app-navigation" class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-black/90 backdrop-blur-xl rounded-[2rem] p-2 flex justify-around items-center shadow-2xl z-[100] border border-white/10 md:hidden hidden">
        <button onclick="nav('home')" class="p-3.5 nav-link hover:text-white transition-colors" id="nav-home" title="Home"><i class="fa-solid fa-house"></i></button>
        <button onclick="nav('recent')" class="p-3.5 nav-link hover:text-white transition-colors" id="nav-recent" title="Verder Kijken"><i class="fa-solid fa-clock-rotate-left"></i></button>
        <button onclick="nav('library')" class="p-3.5 nav-link hover:text-white transition-colors" id="nav-library" title="Bibliotheek"><i class="fa-solid fa-layer-group"></i></button>
        <button onclick="nav('profile')" class="p-3.5 nav-link hover:text-white transition-colors" id="nav-profile" title="Profiel"><i class="fa-solid fa-user-astronaut"></i></button>
    </nav>

    <!-- Netflix-style Details Slide-up Modal Drawer -->
    <div id="details-modal" class="fixed inset-0 bg-black/95 backdrop-blur-md z-[5000] hidden overflow-y-auto no-scrollbar justify-center items-start p-4 md:p-10">
        <div class="bg-[#111111] border border-white/5 rounded-3xl max-w-4xl w-full shadow-2xl overflow-hidden relative mt-10 md:mt-16 mb-20">
            <!-- Close Button -->
            <button onclick="closeDetailsModal()" class="absolute top-4 right-4 w-10 h-10 rounded-full bg-black/70 hover:bg-black text-white flex items-center justify-center border border-white/5 hover:border-white/20 transition-all z-50">
                <i class="fa-solid fa-times"></i>
            </button>

            <!-- Backdrop Banner -->
            <div class="relative w-full h-[25vh] md:h-[45vh] bg-zinc-950">
                <div class="absolute inset-0 bg-gradient-to-t from-[#111111] to-transparent z-10"></div>
                <img id="detail-banner" class="w-full h-full object-cover">
                <div class="absolute bottom-6 left-6 md:left-10 z-20 flex gap-6 items-end">
                    <img id="detail-poster" class="hidden md:block w-28 h-40 rounded-xl object-cover shadow-2xl border border-white/10">
                    <div class="space-y-3">
                        <span id="detail-badge" class="px-2.5 py-1 rounded bg-[#cae962]/20 text-[#cae962] text-[9px] font-black uppercase tracking-wider">SHOW</span>
                        <h2 id="detail-title" class="text-2xl md:text-5xl font-black italic uppercase tracking-tighter text-white leading-none"></h2>
                        <div class="flex items-center gap-3 text-[10px] md:text-xs font-bold text-zinc-400">
                            <span id="detail-score" class="text-accent bg-lime-500/10 px-2 py-0.5 rounded font-black"><i class="fa-solid fa-star text-[9px] mr-1"></i></span>
                            <span id="detail-year" class="bg-zinc-800 px-2 py-0.5 rounded"></span>
                            <span id="detail-episodes" class="bg-zinc-800 px-2 py-0.5 rounded"></span>
                            <span id="detail-status" class="bg-zinc-800 px-2 py-0.5 rounded"></span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="p-6 md:p-10 space-y-10">
                <!-- Synopsis / Overview -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="md:col-span-2 space-y-4">
                        <h3 class="text-xs font-black uppercase tracking-wider text-zinc-500">Beschrijving</h3>
                        <p id="detail-desc" class="text-zinc-300 text-sm leading-relaxed"></p>
                        <div id="detail-genres" class="flex flex-wrap gap-2 pt-2"></div>
                    </div>
                    <div class="space-y-4">
                        <h3 class="text-xs font-black uppercase tracking-wider text-zinc-500">Mijn Lijst Status</h3>
                        <div class="bg-zinc-900/60 p-4 rounded-xl border border-white/5 space-y-4">
                            <div>
                                <p class="text-[9px] font-black text-zinc-500 uppercase">Huidige Status</p>
                                <h4 id="detail-action-text" class="text-xs font-bold text-white mt-1">Niet opgeslagen</h4>
                            </div>
                            <select id="detail-status-dropdown" onchange="onDetailStatusChange(this)" class="w-full bg-black border border-white/10 p-3 rounded-lg text-xs font-bold text-white outline-none">
                                <option value="Not Watching">Niet in lijst</option>
                                <option value="Watching">Watching</option>
                                <option value="Watched">Completed</option>
                                <option value="Dropped">Dropped</option>
                                <option value="Plan to Watch">Plan to Watch</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Characters Grid -->
                <div class="space-y-4">
                    <h3 class="text-xs font-black uppercase tracking-wider text-zinc-500">Karakters</h3>
                    <div id="detail-characters" class="flex gap-4 overflow-x-auto no-scrollbar pb-2">
                        <!-- Filled dynamically -->
                    </div>
                </div>

                <!-- Interactive Episodes -->
                <div class="space-y-4">
                    <h3 class="text-xs font-black uppercase tracking-wider text-zinc-500">Afleveringen</h3>
                    <div id="detail-episodes-grid" class="grid grid-cols-5 sm:grid-cols-10 gap-2">
                        <!-- Episode buttons -->
                    </div>
                </div>

                <!-- Relations -->
                <div class="space-y-4">
                    <h3 class="text-xs font-black uppercase tracking-wider text-zinc-500">Gerelateerd</h3>
                    <div id="detail-relations-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        <!-- Sequel, prequels -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Global State Variables
        const ANILIST_ENDPOINT = 'https://graphql.anilist.co';
        const ANIVEXA_BASE = 'https://anivexa-three.vercel.app'; 
        const SUPABASE_URL = "https://zieuivzmzzxbraefeovl.supabase.co";
        const SUPABASE_KEY = "sb_publishable_EpN5OqgyzVvorrR27-V2MA_ZPCnD7He";
        const ANILIST_API = 'https://graphql.anilist.co';
        const EMBED_PROVIDERS = ['anikoto', 'animegg', 'anidbapp', 'reanime', 'anineko'];

        // ANILIST CREDENTIALS
        const AL_CLIENT_ID = "45642";
        const AL_CLIENT_SECRET = "R4ib1YKW5CMvFk1c03vuWbZrhgZ3dG6lEwtFVfyZ";

        let sb = null;
        let sessionData = null;
        let saveInterval = null;
        let saveTimeout = null;
        let dubTimeout = null;
        let lazyObserver = null;
        let searchTimeout = null;
        let countdownInterval = null;
        let hlsInstance = null;
        let anivexaEpisodesCache = {}; 
        let autoNextTriggered = false;

        let app = {
            view: 'home', id: null, ep: 1, mode: 'sub', server: 'megaplay', searchQuery: '', libraryFilter: 'All',
            user: 'Gebruiker', showContinue: true, lang: 'english', autoPlay: true, autoNext: true, autoSkipIntro: false, skipSeconds: 85, 
            defaultAudio: 'sub', recent: [], xmlLib: [], autoDubFallback: true, anilistToken: null
        };

        let currentPlaybackTime = 0;
        let currentDuration = 0;
        let activeModalId = null;

        // UI Helpers
        window.showToast = function(msg, type='success') {
            const container = document.getElementById('toast-container');
            if(!container) return;
            const toast = document.createElement('div');
            toast.className = `p-4 rounded-xl shadow-2xl text-xs font-black uppercase tracking-widest animate-toast border ${type==='error'?'bg-red-950/90 border-red-500/50 text-red-200':'bg-zinc-900 border-[#cae962]/30 text-[#cae962]'} flex items-center gap-3`;
            toast.innerHTML = `<i class="fa-solid ${type==='error'?'fa-triangle-exclamation':'fa-check-circle'}"></i> ${msg}`;
            container.appendChild(toast);
            setTimeout(() => { toast.classList.add('opacity-0', 'transition-opacity'); setTimeout(()=>toast.remove(), 300); }, 3000);
        };
        
        window.showConfirm = function(title, message, onOk) {
            document.getElementById('confirm-title').innerText = title;
            document.getElementById('confirm-message').innerText = message;
            const modal = document.getElementById('confirm-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            document.getElementById('confirm-cancel-btn').onclick = () => {
                modal.classList.add('hidden'); modal.classList.remove('flex');
            };
            document.getElementById('confirm-ok-btn').onclick = () => {
                modal.classList.add('hidden'); modal.classList.remove('flex');
                if(onOk) onOk();
            };
        };

        // Custom Anivexa dedicated HLS proxy utilizing proxy.corsfix.com for flawless direct streaming
        function proxyM3u8(url) {
            if (!url) return "";
            if (url.includes('proxy.corsfix.com')) return url;
            return `https://proxy.corsfix.com/?url=${encodeURIComponent(url)}`;
        }

        async function fetchWithCorsFallback(url) {
            return await fetch(url);
        }

        async function gql(query, vars) {
            const headers = { 'Content-Type': 'application/json' };
            if (app.anilistToken) {
                headers['Authorization'] = 'Bearer ' + app.anilistToken;
            }
            try {
                const r = await fetch(ANILIST_API, { 
                    method: 'POST', 
                    headers: headers, 
                    body: JSON.stringify({ query, variables: vars }) 
                });
                return await r.json();
            } catch(e) { 
                return null; 
            }
        }

        async function saveCloudData() {
            if (!sessionData) return;
            const settingsPayload = { 
                defaultAudio: app.defaultAudio, 
                server: app.server, 
                user: app.user, 
                showContinue: app.showContinue, 
                lang: app.lang, 
                autoPlay: app.autoPlay, 
                autoNext: app.autoNext, 
                autoSkipIntro: app.autoSkipIntro, 
                skipSeconds: app.skipSeconds, 
                autoDubFallback: app.autoDubFallback,
                anilistToken: app.anilistToken || null 
            };
            await sb.from('anime_users').update({
                watchlist: app.xmlLib, 
                recent: app.recent,
                settings: settingsPayload
            }).eq('id', sessionData.user.id);
        }
        function saveCloudDataDebounced() { clearTimeout(saveTimeout); saveTimeout = setTimeout(saveCloudData, 1000); }

        window.nav = function(view, params = {}) {
            if (!sessionData) return showLoginPage('login');
            if (app.view === 'watch' && app.id) saveCurrentVideoTime();
            
            clearInterval(saveInterval); 
            clearTimeout(dubTimeout);
            clearInterval(countdownInterval);
            if (lazyObserver) lazyObserver.disconnect();
            if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }

            app.view = view; app.id = params.id || null; app.ep = params.ep || 1;
            if (view === 'watch') { app.mode = app.defaultAudio; currentPlaybackTime = 0; currentDuration = 0; }
            
            syncStateToUrl(); render(); window.scrollTo(0,0);
        };

        function syncStateToUrl() {
            let hash = `#${app.view}`;
            if (app.id) hash += `?id=${app.id}${app.ep ? '&ep=' + app.ep : ''}`;
            if (window.location.hash !== hash) history.replaceState(null, null, hash);
        }

        function restoreStateFromUrl() {
            const hash = window.location.hash;
            if (!hash || hash === '#') { app.view = 'home'; app.id = null; app.ep = 1; return; }
            
            if (hash.includes('access_token=') || hash.includes('error_description=')) {
                return;
            }

            const parts = hash.substring(1).split('?');
            app.view = parts[0] || 'home'; app.id = null; app.ep = 1;

            if (parts[1]) {
                const params = new URLSearchParams(parts[1]);
                if (params.has('id')) app.id = params.get('id');
                if (params.has('ep')) app.ep = parseInt(params.get('ep') || '1');
            }
        }
        window.onhashchange = () => { restoreStateFromUrl(); render(); };

        window.addEventListener('scroll', () => {
            const header = document.getElementById('app-header');
            if (!header) return;
            if (window.scrollY > 40) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        });

        // Auth
        function showLoginPage(mode = 'login') {
            document.getElementById('app-header').classList.add('hidden');
            document.getElementById('app-navigation').classList.add('hidden');
            const main = document.getElementById('content');
            if(!main) return;
            
            if (mode === 'register') {
                main.innerHTML = `
                    <div class="max-w-md mx-auto mt-16 p-8 card border border-white/5 shadow-2xl animate-fade-in bg-zinc-950">
                        <h2 class="text-3xl font-black italic accent uppercase tracking-tighter mb-2 text-center text-[#cae962]">ANIME<span class="text-white">MAX</span></h2>
                        <p class="text-[10px] text-zinc-500 uppercase tracking-widest text-center mb-8">Nieuw cloud-profiel aanmaken</p>
                        <div class="space-y-4">
                            <input type="text" id="auth-email" class="w-full bg-zinc-900 border border-white/5 p-4 rounded-xl outline-none focus:border-[#cae962] text-white font-bold text-xs" placeholder="E-mailadres">
                            <input type="text" id="auth-username" class="w-full bg-zinc-900 border border-white/5 p-4 rounded-xl outline-none focus:border-[#cae962] text-white font-bold text-xs" placeholder="Gebruikersnaam">
                            <input type="password" id="auth-password" class="w-full bg-zinc-900 border border-white/5 p-4 rounded-xl outline-none focus:border-[#cae962] text-white font-bold text-xs" placeholder="Wachtwoord (min. 6)">
                            <button onclick="handleAuth('reg')" class="bg-[#cae962] text-black font-black py-4 rounded-xl w-full text-xs uppercase tracking-widest hover:bg-lime-400 transition font-bold">Account Aanmaken</button>
                            <button onclick="handleGoogleLogin()" class="bg-white text-black font-black py-4 rounded-xl w-full text-xs uppercase tracking-widest flex items-center justify-center gap-2 mt-4 hover:bg-zinc-200 transition"><i class="fa-brands fa-google"></i> Google</button>
                            <p class="text-center text-xs text-zinc-500 mt-4">Al een account? <button onclick="showLoginPage('login')" class="text-[#cae962] font-bold hover:underline">Inloggen</button></p>
                        </div>
                    </div>`;
            } else if (mode === 'forgot') {
                main.innerHTML = `
                    <div class="max-w-md mx-auto mt-16 p-8 card border border-white/5 shadow-2xl animate-fade-in bg-zinc-950">
                        <h2 class="text-3xl font-black italic accent uppercase tracking-tighter mb-2 text-center text-[#cae962]">Wachtwoord Herstellen</h2>
                        <p class="text-[10px] text-zinc-500 uppercase tracking-widest text-center mb-8">Ontvang een herstellink</p>
                        <div class="space-y-4">
                            <input type="text" id="auth-reset-input" class="w-full bg-zinc-900 border border-white/5 p-4 rounded-xl outline-none focus:border-[#cae962] text-white font-bold text-xs" placeholder="Gebruikersnaam of E-mailadres">
                            <button onclick="handleForgotPassword()" class="bg-[#cae962] text-black font-black py-4 rounded-xl w-full text-xs uppercase tracking-widest hover:bg-lime-400 transition font-bold">Verstuur herstellink</button>
                            <p class="text-center text-xs text-zinc-500 mt-4"><button onclick="showLoginPage('login')" class="text-[#cae962] font-bold hover:underline"><i class="fa-solid fa-arrow-left"></i> Terug naar login</button></p>
                        </div>
                    </div>`;
            } else {
                main.innerHTML = `
                    <div class="max-w-md mx-auto mt-16 p-8 card border border-white/5 shadow-2xl animate-fade-in bg-zinc-950">
                        <h2 class="text-3xl font-black italic accent uppercase tracking-tighter mb-2 text-center text-[#cae962]">ANIME<span class="text-white">MAX</span></h2>
                        <p class="text-[10px] text-zinc-500 uppercase tracking-widest text-center mb-8">Inloggen</p>
                        <div class="space-y-4">
                            <input type="text" id="auth-email" class="w-full bg-zinc-900 border border-white/5 p-4 rounded-xl outline-none focus:border-[#cae962] text-white font-bold text-xs" placeholder="E-mailadres of Gebruikersnaam">
                            <input type="password" id="auth-password" class="w-full bg-zinc-900 border border-white/5 p-4 rounded-xl outline-none focus:border-[#cae962] text-white font-bold text-xs" placeholder="Wachtwoord">
                            <div class="text-right">
                                <button onclick="showLoginPage('forgot')" class="text-zinc-500 text-xs hover:text-white transition">Wachtwoord vergeten?</button>

        window.setupNativePlayer = function(m3u8Url, subtitles = []) {
            const video = document.getElementById('native-player');
            if (!video) return;

            if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
            video.innerHTML = ''; 
            window.currentM3u8Url = m3u8Url;
            
            const vlcBtn = document.getElementById('vlc-btn');
            if (vlcBtn) {
                const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
                vlcBtn.href = isMobile ? ("vlc-x-callback://x-callback-url/stream?url=" + encodeURIComponent(m3u8Url)) : ("vlc://" + m3u8Url);
            }

            if (subtitles && subtitles.length > 0) {
                subtitles.forEach(sub => {
                    const subUrl = sub.file || sub.url;
                    if(subUrl) {
                        const track = document.createElement('track');
                        track.kind = 'captions'; 
                        track.label = sub.label || sub.lang || sub.language || 'Sub';
                        track.srclang = (track.label).substring(0, 2).toLowerCase(); 
                        track.src = subUrl;
                        if (track.label.toLowerCase().includes('eng') || track.label.toLowerCase().includes('nl')) track.default = true;
                        video.appendChild(track);
                    }
                });
            }

            function initHlsStream(streamUrl) {
                if (Hls.isSupported()) {
                    hlsInstance = new Hls({
                        maxBidirectionalLinkDelay: 1.5,
                        xhrSetup: function(xhr, url) { 
                            xhr.withCredentials = false; 
                            if (url.includes('proxy.corsfix.com')) xhr.setRequestHeader('x-corsfix-key', 'cfx_6caec83cae44e09879b57ba6b15d18b0');
                        }
                    });
                    hlsInstance.loadSource(streamUrl);
                    hlsInstance.attachMedia(video);
                    hlsInstance.on(Hls.Events.MANIFEST_PARSED, function() { restoreVideoPositionAndPlay(video); });
                    hlsInstance.on(Hls.Events.ERROR, function(event, data) {
                        if (data.fatal) {
                            if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                                window.showToast("Stream netwerkfout. Probeer een andere server of open in VLC.", "error");
                            } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
                                hlsInstance.recoverMediaError();
                            } else {
                                hlsInstance.destroy();
                            }
                        }
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = streamUrl;
                    video.addEventListener('loadedmetadata', function() { restoreVideoPositionAndPlay(video); });
                }
            }

            const isM3u8 = /\.m3u8?(\?|$)/i.test(m3u8Url);
            if (isM3u8) {
                initHlsStream(proxyM3u8(m3u8Url));
            } else {
                video.src = m3u8Url;
                video.addEventListener('loadedmetadata', function() { restoreVideoPositionAndPlay(video); });
            }

            video.ontimeupdate = () => { window.updateProgressUI(video.currentTime, video.duration); };
        };

        window.loadStreamAndPlay = async function(anilistId, targetEp, mode, serverId) {
            const iframeEl = document.getElementById('player');
            const nativeEl = document.getElementById('native-player-container');

            if (serverId === 'megaplay') {
                iframeEl.src = `https://megaplay.buzz/stream/ani/${anilistId}/${targetEp}/${mode}`;
                iframeEl.classList.remove('hidden'); iframeEl.classList.add('block');
                nativeEl.classList.add('hidden'); nativeEl.classList.remove('block');
                if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
                return;
            }

            const providers = await loadAllProviders(anilistId);
            const pObj = providers.find(p => p.id === serverId);
            if (!pObj) return;

            try {
                const res = await fetchWithCorsFallback(`${ANIVEXA_BASE}/watch/${pObj.provider}/${anilistId}/${mode}/${pObj.provider}-${targetEp}`);
                const data = await res.json();
                let streamData = data.streams ? data : (data.results || data);
                
                if (streamData && streamData.streams && streamData.streams.length > 0) {
                    let best = streamData.streams.find(s => s.quality === '1080p' || s.quality === 'auto' || s.quality === '720p') || streamData.streams[0];

                    if (best.embed || best.type === 'embed' || EMBED_PROVIDERS.includes(pObj.provider.toLowerCase())) {
                        iframeEl.src = best.embed || best.url;
                        iframeEl.classList.remove('hidden'); iframeEl.classList.add('block');
                        nativeEl.classList.add('hidden'); nativeEl.classList.remove('block');
                        if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
                    } else {
                        iframeEl.classList.add('hidden'); iframeEl.classList.remove('block'); iframeEl.src = ""; 
                        nativeEl.classList.remove('hidden'); nativeEl.classList.add('block');
                        window.setupNativePlayer(best.url, streamData.subtitles || []);
                    }
                } else {
                    window.showToast("Stream offline of onbeschikbaar.", "error");
                }
            } catch (err) {}
        };

            app.xmlLib = app.xmlLib.map(i => {
                if (i && i.id == id) { found = true; return { ...i, status: finalStat, progress: parseInt(ep), episodes: total, coverImage: img || i.coverImage }; }
                return i;
            });
            if (!found) app.xmlLib.push({ id: id.toString(), title, status: finalStat, progress: parseInt(ep), episodes: total, coverImage: img });
            
            saveCloudDataDebounced();
            window.syncProgressToAniList(id, ep, finalStat);

                const code = urlParams.get('code');
                // Wis onmiddellijk de '?code=...' parameter uit de browserbalk
                window.history.replaceState({}, document.title, window.location.pathname + window.location.hash);
                
                try {
                    window.showToast("AniList code verifiëren...");
                    const res = await fetch('https://anilist.co/api/v2/oauth/token', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': 'application/json',
                        },
                        body: JSON.stringify({
                            grant_type: 'authorization_code',
                            client_id: AL_CLIENT_ID,
                            client_secret: AL_CLIENT_SECRET,
                            redirect_uri: window.location.origin + window.location.pathname,
                            code: code
                        })
                    });
                    const data = await res.json();
                    if (data.access_token) {
                        pendingAniListToken = data.access_token;
                    }
                } catch(e) {
                    console.error("AniList OAuth Fout:", e);
                    window.showToast("Kan AniList token niet ophalen.", "error");
                }
            }

            // 2. Controleer Supabase sessie
            const { data } = await sb.auth.getSession();
            if (data.session) {
                sessionData = data.session;
                await loadCloudData();

                // 3. Als we net een token kregen via OAuth, sla deze dan nu op in het profiel
                if (pendingAniListToken) {
                    verifyAndSaveAniListToken(pendingAniListToken);
                }
            } else {
                showLoginPage('login');
            }
            
            restoreStateFromUrl();
            if (sessionData) render();
            
            sb.auth.onAuthStateChange(async (event, session) => {
                if (event === 'SIGNED_IN') {
                    sessionData = session;
                    await loadCloudData();
                    restoreStateFromUrl();
                    render();
                } else if (event === 'SIGNED_OUT') {
                    sessionData = null;
                    showLoginPage('login');
                } else if (event === 'PASSWORD_RECOVERY') {
                    showResetPasswordView();
                }
            });
        });

    </script>
</body>
</html>
