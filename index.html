<!DOCTYPE html>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        body { background: #080808; color: white; font-family: 'Outfit', sans-serif; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .accent { color: #cae962; }
        .bg-accent { background: #cae962; color: #000; }
        .glass { background: rgba(15, 15, 15, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .card { background: #121212; border-radius: 18px; border: 1px solid rgba(255,255,255,0.03); transition: 0.2s; }
        .card:hover { border-color: rgba(202, 233, 98, 0.3); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        iframe, video { width: 100%; height: 100%; border: none; }
        
        /* Toggle Switch */
        .toggle-checkbox:checked + .toggle-bg { background-color: #cae962; }
        .toggle-checkbox:checked + .toggle-bg .toggle-dot { transform: translateX(100%); background-color: #000; }
        
        /* Toast Container */
        #toast-container {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 360px;
            z-index: 10000;
            pointer-events: none;
        }

        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-toast { animation: slideDown 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Custom Video Player Styling */
        video::cue {
            background-color: transparent;
            color: white;
            text-shadow: 2px 2px 4px #000, -2px -2px 4px #000, 2px -2px 4px #000, -2px 2px 4px #000;
            font-family: 'Outfit', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
        }
    </style>
</head>

        // --- TOASTS & MODALS ---
        window.showToast = function(message, type = 'success') {
            const container = document.getElementById('toast-container');
            if(!container) return;
            const toast = document.createElement('div');
            toast.className = `p-4 rounded-xl text-xs font-black uppercase tracking-wider flex items-center justify-between shadow-2xl border text-center animate-toast pointer-events-auto w-full ${

            container.appendChild(toast);
            setTimeout(() => { if (toast.parentElement) toast.remove(); }, 4000);
        };

        window.showConfirm = function(title, message, onConfirm) {

        // --- INTELLIGENT CORS PROXY WRAPPER ---
        async function fetchWithCorsFallback(url) {
            // Probeer eerst een directe verbinding
            try {
                const response = await fetch(url);
                if (response.ok || response.status === 404 || response.status === 500) return response;
            } catch (e) {
                console.warn(`Directe verbinding mislukt voor ${url}, CORS proxy inschakelen...`, e);
            }

            // Snelle fallback proxy (corsproxy.io)
            try {
                const proxyUrl = `https://corsproxy.io/?` + encodeURIComponent(url);
                const response = await fetch(proxyUrl);
                if (response.ok || response.status === 404 || response.status === 500) return response;
            } catch (e) {
                console.warn(`Proxy 1 mislukt voor ${url}, overschakelen naar AllOrigins...`, e);
            }

            // Ultieme fallback proxy (allorigins.win)
            try {
                const proxyUrl = `https://api.allorigins.win/raw?url=` + encodeURIComponent(url);
                const response = await fetch(proxyUrl);
                if (response.ok || response.status === 404 || response.status === 500) return response;
            } catch (e) {
                console.warn(`Proxy 2 mislukt voor ${url}, overschakelen naar Thingproxy...`, e);
            }

            // Thingproxy
            try {
                const proxyUrl = `https://thingproxy.freeboard.io/fetch/` + url;
                const response = await fetch(proxyUrl);
                if (response.ok || response.status === 404 || response.status === 500) return response;
            } catch (e) {
                console.error(`Alle fallbacks en proxies zijn mislukt voor ${url}`, e);
            }

            throw new Error(`Verbindingsfout naar ${url} (CORS/Offline)`);
        }

        // --- DEFENSIVE MULTI-VERSION API NORMALIZATION ---
        function extractEpisodes(episodesData) {
            let sub = [];
            let dub = [];

            if (Array.isArray(episodesData)) {
                // Flat array mapping (V1 of V2)
                episodesData.forEach(ep => {
                    if (ep.dub || ep.category === 'dub') {
                        dub.push(ep);
                    } else {
                        sub.push(ep);
                    }
                });
            } else if (episodesData && typeof episodesData === 'object') {
                // Split format { sub: [], dub: [] }
                if (Array.isArray(episodesData.sub)) sub = episodesData.sub;
                if (Array.isArray(episodesData.dub)) dub = episodesData.dub;
                
                // Fallback voor alternatieve data structuren
                if (sub.length === 0 && dub.length === 0) {
                    for (const [key, val] of Object.entries(episodesData)) {
                        if (Array.isArray(val)) {
                            if (key.toLowerCase().includes('dub')) dub = val;
                            else sub = val;
                        }
                    }
                }
            }
            return { sub, dub };
        }

        function normalizeApiProviders(data, apiVersion) {
            let list = [];
            if (!data) return list;

            const providers = data.providers || data;
            if (!providers) return list;

            if (Array.isArray(providers)) {
                // Array structuur
                providers.forEach(p => {
                    const providerName = p.providerId || p.id || p.name || "unknown";
                    const { sub, dub } = extractEpisodes(p.episodes || p);
                    list.push({
                        id: `${apiVersion}-${providerName}`,
                        api: apiVersion,
                        provider: providerName,
                        sub: sub,
                        dub: dub
                    });
                });
            } else if (typeof providers === 'object') {
                // Object structuur (zoals kiwi, arc, zoro in jouw screenshots)
                for (const [providerName, pData] of Object.entries(providers)) {
                    if (pData && typeof pData === 'object') {
                        const { sub, dub } = extractEpisodes(pData.episodes || pData);
                        list.push({
                            id: `${apiVersion}-${providerName}`,
                            api: apiVersion,
                            provider: providerName,
                            sub: sub,
                            dub: dub
                        });
                    }
                }
            }
            return list;
        }

        window.loadAllProviders = async function(anilistId) {
            if (miruroEpisodesCache[anilistId]) return miruroEpisodesCache[anilistId];

            let allProviders = [];
            
            // 1. Fetch V1 (Onafhankelijk om cascade crashes te voorkomen)
            try {
                const url = `${MIRURO_V1_BASE}/episodes/${anilistId}`;
                const resV1 = await fetchWithCorsFallback(url);
                if (resV1.ok) {
                    const dataV1 = await resV1.json();
                    const parsedV1 = normalizeApiProviders(dataV1, 'v1');
                    allProviders = allProviders.concat(parsedV1);
                    console.log("V1 Geladen Providers:", parsedV1);
                }
            } catch (e) {
                console.error("V1 API Episodes fetch mislukt:", e);
            }

            // 2. Fetch V2 (Onafhankelijk om cascade crashes te voorkomen)
            try {
                const url = `${MIRURO_V2_BASE}/episodes/${anilistId}`;
                const resV2 = await fetchWithCorsFallback(url);
                if (resV2.ok) {
                    const dataV2 = await resV2.json();
                    const parsedV2 = normalizeApiProviders(dataV2, 'v2');
                    allProviders = allProviders.concat(parsedV2);
                    console.log("V2 Geladen Providers:", parsedV2);
                }
            } catch (e) {
                console.error("V2 API Episodes fetch mislukt:", e);
            }

            miruroEpisodesCache[anilistId] = allProviders;
            return allProviders;
        };

        window.setupNativePlayer = function(m3u8Url, subtitles = []) {
            const video = document.getElementById('native-player');
            if (!video) return;

            if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
            video.innerHTML = ''; // Vorige tracks weggooien

            // Subtitles injecteren
            if (subtitles && subtitles.length > 0) {
                subtitles.forEach(sub => {
                    const subUrl = sub.file || sub.url;
                    if(subUrl) {
                        const track = document.createElement('track');
                        track.kind = 'captions';
                        track.label = sub.label || sub.lang || sub.language || 'Sub';
                        track.srclang = (track.label).substring(0, 2).toLowerCase();
                        track.src = subUrl;
                        if (track.label.toLowerCase().includes('eng') || track.label.toLowerCase().includes('nl')) track.default = true;
                        video.appendChild(track);
                    }
                });
            }

            if (Hls.isSupported()) {
                hlsInstance = new Hls();
                hlsInstance.loadSource(m3u8Url);
                hlsInstance.attachMedia(video);
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, function() {
                    restoreVideoPositionAndPlay(video);
                });
                hlsInstance.on(Hls.Events.ERROR, function(event, data) {
                     if(data.fatal) {
                         console.error("Fatal player error:", data);
                         window.showToast("Stream laadfout! Probeer een andere server.", "error");
                     }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = m3u8Url;
                video.addEventListener('loadedmetadata', function() {
                    restoreVideoPositionAndPlay(video);
                });
            }

            video.ontimeupdate = () => { window.updateProgressUI(video.currentTime, video.duration); };
        };

        function restoreVideoPositionAndPlay(video) {
            const ar = app.recent.find(r => r && r.id == app.id && r.ep == app.ep);
            if (ar && ar.time > 0 && ar.time < (video.duration - 5 || 99999)) {
                video.currentTime = ar.time;
            }
            if (app.autoPlay) video.play().catch(e => console.log("Autoplay restrictie door de browser."));
        }

        window.loadMiruroAndRenderServers = async function(anilistId, targetEp, mode) {
            const container = document.getElementById('miruro-servers-container');
            if (!container) return;

            container.innerHTML = '<span class="text-[9px] text-zinc-500 whitespace-nowrap"><i class="fa-solid fa-spinner animate-spin"></i> API\'s synchroniseren...</span>';

            const providers = await loadAllProviders(anilistId);
            container.innerHTML = '';

            let validServers = [];
            
            // Check welke providers de aflevering hebben op basis van de geselecteerde modus (sub/dub)
            providers.forEach(p => {
                 const epList = p[mode] || [];
                 const hasEp = epList.find(e => e.number == targetEp);
                 if (hasEp) validServers.push(p);
            });

            if (app.server !== 'megaplay' && !validServers.find(vs => vs.id === app.server)) {
                if (validServers.length > 0) {
                    app.server = validServers[0].id;
                } else {
                    app.server = 'megaplay';
                }
                saveCloudDataDebounced();
            }

            if (validServers.length === 0) {
                container.innerHTML = '<span class="text-[9px] text-zinc-600 whitespace-nowrap">Geen alternatieve servers gevonden op dit moment</span>';
            }

            // Knoppen uittekenen voor werkende providers
            validServers.forEach(p => {
                const btn = document.createElement('button');
                const srvName = p.id;
                const isActive = app.server === srvName;
                btn.className = `px-3 py-1.5 rounded-lg text-[9px] font-black uppercase transition-colors whitespace-nowrap ${isActive ? 'bg-accent text-black font-black' : 'bg-zinc-800 text-zinc-400 hover:bg-zinc-700'}`;
                btn.innerHTML = `<i class="fa-solid fa-bolt text-[8px] mr-1"></i> ${p.provider.toUpperCase()} (${p.api.toUpperCase()})`;
                btn.onclick = () => window.setServer(srvName);
                container.appendChild(btn);
            });
            
            return validServers;
        };

        window.loadMiruroStreamAndPlay = async function(anilistId, targetEp, mode, serverId) {
            const providers = await loadAllProviders(anilistId);
            const pObj = providers.find(p => p.id === serverId);

            if (!pObj) {
                window.showToast("Geselecteerde server ontbreekt.", "error");
                return;
            }

            const epList = pObj[mode] || [];
            const epObj = epList.find(e => e.number == targetEp);

            if (!epObj) {
                window.showToast(`Aflevering ${targetEp} is offline op deze server.`, "error");
                return;
            }

            const baseUrl = pObj.api === 'v1' ? MIRURO_V1_BASE : MIRURO_V2_BASE;
            let slug = epObj.slug || epObj.id;
            let fetchUrl = "";

            // Check of de slug al een direct routing path bevat (Step 2 V2 feature)
            if (epObj.id && epObj.id.includes('watch/')) {
                 fetchUrl = `${baseUrl}/${epObj.id}`;
            } else {
                 fetchUrl = `${baseUrl}/watch/${pObj.provider}/${anilistId}/${mode}/${slug}`;
            }

            try {
                const res = await fetchWithCorsFallback(fetchUrl);
                const data = await res.json();
                
                let streamData = null;
                // Parse schemas dynamisch
                if (data.streams) {
                     streamData = data;
                } else if (data.results && data.results.bestStream) {
                     streamData = {
                         streams: [data.results.bestStream, ...(data.results.streams || [])],
                         subtitles: data.results.subtitles || []
                     };
                } else if (data.results && data.results.streams) {
                     streamData = data.results;
                } else if (data.bestStream) {
                    streamData = { streams: [data.bestStream], subtitles: data.subtitles || [] };
                }
                
                if (streamData && streamData.streams && streamData.streams.length > 0) {
                    let best = streamData.streams.find(s => s.quality === '1080p' || s.quality === 'auto' || s.quality === '720p') || streamData.streams[0];
                    window.setupNativePlayer(best.url, streamData.subtitles || []);
                } else {
                    window.showToast(`Geen videobronnen gevonden op de server.`, "error");
                }
            } catch (err) {
                console.error(err);
                window.showToast("Ophalen van videostream mislukt.", "error");
            }
        };

        window.setServer = function(srv) {
            if (app.server === srv) return;
            app.server = srv;
            saveCloudDataDebounced();
            render(); 
        };

        // --- ROUTING ---
        function syncStateToUrl() {
            let hash = `#${app.view}`;
            if (app.id) hash += `?id=${app.id}${app.ep ? '&ep=' + app.ep : ''}`;
            if (window.location.hash !== hash) history.replaceState(null, null, hash);
        }

        function restoreStateFromUrl() {
            const hash = window.location.hash;
            if (!hash || hash === '#') {
                app.view = 'home'; app.id = null; app.ep = 1; return;
            }
            const parts = hash.substring(1).split('?');
            app.view = parts[0] || 'home';
            app.id = null; app.ep = 1;

            if (parts[1]) {
                const params = new URLSearchParams(parts[1]);
                if (params.has('id')) app.id = params.get('id');
                if (params.has('ep')) app.ep = parseInt(params.get('ep') || '1');
            }
        }

        window.onhashchange = () => { restoreStateFromUrl(); render(); };

        // --- AUTH & SUPABASE ---
        window.onload = async () => {

        async function gql(query, vars) {
            try {
                const r = await fetch(ANILIST_API, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ query, variables: vars }) });
                return await r.json();
            } catch(e) { return null; }

        async function fetchMyAnimeListMetadata(id, malId, title) {
            const cacheKey = id || malId || title;
            if (!cacheKey) return null;
            if (mediaCache[cacheKey]) return mediaCache[cacheKey];
            try {
                const url = malId ? `https://api.jikan.moe/v4/anime/${malId}` : `https://api.jikan.moe/v4/anime?q=${encodeURIComponent(title)}&limit=1`;
                const r = await fetch(url);
                const json = await r.json();
                const data = malId && json.data ? json.data : (json.data && json.data[0] ? json.data[0] : null);
                if (data) {
                    const result = { episodes: data.episodes || 12, coverImage: data.images.jpg.large_image_url };
                    mediaCache[cacheKey] = result; return result;
                }
            } catch (e) { }
            return null;
        }

        window.exportMyAnimeListXML = async function() {
            window.showToast("Voorbereiden (ophalen MAL ID's)... Dit kan even duren.");
            const aniIds = app.xmlLib.map(i => parseInt(i.id)).filter(id => !isNaN(id));
            let malIdMap = {};
            
            try {
                for (let i = 0; i < aniIds.length; i += 50) {
                    const chunk = aniIds.slice(i, i + 50);
                    const res = await gql(`query($in:[Int]){Page(perPage:50){media(id_in:$in,type:ANIME){id idMal}}}`, { "in": chunk });
                    if (res && res.data && res.data.Page.media) {
                        res.data.Page.media.forEach(m => {
                            if (m.idMal) malIdMap[m.id] = m.idMal;
                        });
                    }
                }
            } catch (e) {
                console.error("Fout bij ophalen MAL ID's", e);
            }

            let xml = `<?xml version="1.0" encoding="UTF-8" ?>\n<myanimelist>\n\t<myinfo>\n\t\t<user_name>${app.user}</user_name>\n\t\t<user_export_type>1</user_export_type>\n\t</myinfo>\n`;
            
            app.xmlLib.forEach(item => {
                let statusStr = "Watching";
                if (item.status === "Watched" || item.status === "Completed") statusStr = "Completed";
                else if (item.status === "Dropped") statusStr = "Dropped";
                else if (item.status === "Plan to Watch") statusStr = "Plan to Watch";
                
                const malId = malIdMap[item.id] || item.id;
                xml += `\t<anime>\n\t\t<series_animedb_id>${malId}</series_animedb_id>\n\t\t<series_title><![CDATA[${item.title}]]></series_title>\n\t\t<my_watched_episodes>${item.progress}</my_watched_episodes>\n\t\t<my_status>${statusStr}</my_status>\n\t\t<update_on_import>1</update_on_import>\n\t</anime>\n`;
            });
            xml += `</myanimelist>`;
            
            const blob = new Blob([xml], { type: 'text/xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `animemax_mal_backup_${Date.now()}.xml`;
            a.click();
            URL.revokeObjectURL(url);
            window.showToast("MAL Back-up succesvol gedownload!");
        };

        window.handleXML = function() {
            const file = document.getElementById('xml-input').files[0];
            if (!file) return window.showToast("Selecteer een XML bestand", "error");
            const reader = new FileReader();
            
            reader.onload = async function(e) {
                const content = e.target.result;
                if (content.includes('<anime>')) {
                    window.showToast("XML analyseren en vertalen...");
                    
                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(content, "text/xml");
                    const animes = xmlDoc.getElementsByTagName("anime");
                    
                    let importedMalItems = [];
                    let malIdsToFetch = [];

                    for (let i = 0; i < animes.length; i++) {
                        const idText = animes[i].getElementsByTagName("series_animedb_id")[0]?.textContent;
                        const title = animes[i].getElementsByTagName("series_title")[0]?.textContent || "Unknown";
                        const eps = parseInt(animes[i].getElementsByTagName("my_watched_episodes")[0]?.textContent || 0);
                        const sNum = animes[i].getElementsByTagName("my_status")[0]?.textContent;
                        
                        let statusStr = "Watching";
                        if (sNum == "2" || sNum === "Completed" || sNum === "Watched") statusStr = "Watched";
                        if (sNum == "4" || sNum === "Dropped") statusStr = "Dropped";
                        if (sNum == "6" || sNum === "Plan to Watch") statusStr = "Plan to Watch";
                        
                        if (idText) {
                            const id = parseInt(idText);
                            if (!isNaN(id)) {
                                importedMalItems.push({ malId: id, title, status: statusStr, progress: eps });
                                malIdsToFetch.push(id);
                            }
                        }
                    }

                    let malToAniMap = {};
                    let aniMetaData = {};
                    try {
                        for (let i = 0; i < malIdsToFetch.length; i += 50) {
                            const chunk = malIdsToFetch.slice(i, i + 50);
                            const res = await gql(`query($in:[Int]){Page(perPage:50){media(idMal_in:$in,type:ANIME){id idMal title{romaji english} coverImage{large} episodes}}}`, { "in": chunk });
                            if (res && res.data && res.data.Page.media) {
                                res.data.Page.media.forEach(m => {
                                    malToAniMap[m.idMal] = m.id;
                                    aniMetaData[m.id] = {
                                        title: app.lang === 'english' ? (m.title.english || m.title.romaji) : m.title.romaji,
                                        coverImage: m.coverImage.large,
                                        episodes: m.episodes || 12
                                    };
                                });
                            }
                        }
                    } catch (err) {
                        console.error("Fout bij omzetten MAL IDs", err);
                    }

                    let finalImport = [];
                    importedMalItems.forEach(item => {
                        const aniId = malToAniMap[item.malId];
                        if (aniId) {
                            const meta = aniMetaData[aniId];
                            finalImport.push({
                                id: aniId.toString(),
                                title: meta.title || item.title,
                                status: item.status,
                                progress: item.progress,
                                episodes: meta.episodes,
                                coverImage: meta.coverImage
                            });
                        } else {
                            finalImport.push({
                                id: item.malId.toString(),
                                title: item.title,
                                status: item.status,
                                progress: item.progress,
                                episodes: 12,
                                coverImage: ""
                            });
                        }
                    });

                    app.xmlLib = mergeWatchlists(app.xmlLib, finalImport);
                    saveCloudData();
                    window.showToast(`${finalImport.length} items geïmporteerd & omgezet!`);
                    if(app.view === 'library') renderLibraryGrid();
                } else { 
                    window.showToast("Ongeldig bestand.", "error"); 
                }
            };
            reader.readAsText(file);
        };

        function formatDuration(sec) {
            if (!sec || isNaN(sec)) return "0:00";
            const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = Math.floor(sec % 60);
            return h > 0 ? `${h}:${m<10?'0':''}${m}:${s<10?'0':''}${s}` : `${m}:${s<10?'0':''}${s}`;
        }

        window.updateProgressUI = function(seconds, duration) {
            currentPlaybackTime = parseFloat(seconds);
            if (duration !== undefined && duration > 0) currentDuration = parseFloat(duration);
            
            const timeText = document.getElementById('playback-time-text');
            const percentageText = document.getElementById('playback-progress-percentage');
            if (timeText) timeText.innerText = `${formatDuration(currentPlaybackTime)} / ${formatDuration(currentDuration)}`;
            if (percentageText && currentDuration > 0) {
                const pct = Math.round((currentPlaybackTime / currentDuration) * 100);
                percentageText.innerText = `${pct}%`;
            }

            // Auto-next Trigger logic
            const isNearEnd = (currentDuration > 10 && currentPlaybackTime >= currentDuration - 2.5);
            if (isNearEnd) {
                if (autoNextTriggered) return;
                autoNextTriggered = true;
                setTimeout(() => { autoNextTriggered = false; }, 8000);
                if (app.autoNext) window.playNextEpisode();
            }

        function mergeWatchlists(ex, inc) {

            inc.forEach(i => {

        window.importAndMergeAniListCloud = async function() {
            if (!app.user) return window.showToast("Stel eerst een gebruikersnaam in!", "error");
            window.showToast("Bezig met ophalen...");
            try {
                const res = await gql(`query($u:String){MediaListCollection(userName:$u,type:ANIME){lists{name entries{progress media{id title{romaji english}coverImage{large}episodes}}}}}`, {u: app.user});
                if (res && res.data && res.data.MediaListCollection) {
                    let imp = [];
                    res.data.MediaListCollection.lists.forEach(l => {
                        let st = "Watching"; if(l.name.toLowerCase().includes("completed")) st = "Watched"; if(l.name.toLowerCase().includes("dropped")) st = "Dropped"; if(l.name.toLowerCase().includes("plan")) st = "Plan to Watch";
                        l.entries.forEach(e => imp.push({ id: e.media.id.toString(), title: e.media.title.english || e.media.title.romaji, status: st, progress: parseInt(e.progress||0), episodes: parseInt(e.media.episodes||12), coverImage: e.media.coverImage.large }));
                    });
                    app.xmlLib = mergeWatchlists(app.xmlLib, imp); saveCloudData();
                    window.showToast(`${imp.length} items samengevoegd!`); nav('library');
                } else window.showToast("Geen AniList gevonden.", "error");
            } catch (e) { window.showToast("Mislukt: Rate Limit.", "error"); }
        };

        window.removeRecentAnime = function(e, id) {
            if(e) { e.stopPropagation(); e.preventDefault(); }
            window.showConfirm("Verwijderen", "Verwijderen uit geschiedenis?", () => { app.recent = app.recent.filter(r => r && r.id != id); saveCloudDataDebounced(); window.showToast("Verwijderd!"); render(); });
        };

        window.filterXml = function(status) { app.libraryFilter = status; renderLibraryGrid(); };

        // Event listener for MegaPlay iframe communication
        window.addEventListener('message', function(event) {
            if (app.server !== 'megaplay') return;
            try {
                const data = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
                if (!data) return;
                const eventName = data.event || data.method || (data.value && data.value.event);
                
                if (eventName === 'timeupdate' || eventName === 'timeUpdate') {
                    const seconds = data.value?.seconds || data.data?.seconds || data.seconds || data.value?.time || data.time;
                    const duration = data.value?.duration || data.data?.duration || data.duration;
                    if (seconds !== undefined) window.updateProgressUI(seconds, duration);
                }
                
                const isEnded = eventName === 'ended' || eventName === 'onVideoEnded' || eventName === 'complete';
                if (isEnded) {
                    if (autoNextTriggered) return;
                    autoNextTriggered = true;
                    setTimeout(() => { autoNextTriggered = false; }, 8000);
                    if (app.autoNext) window.playNextEpisode();
                }
            } catch (e) { }
        });

        window.playNextEpisode = function() {
            if (document.fullscreenElement || document.webkitFullscreenElement) {
                if (document.exitFullscreen) {
                    let p = document.exitFullscreen();
                    if (p && p.catch) p.catch(()=>{});
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                }
            }

            const loc = app.xmlLib.find(i => i && i.id == app.id) || app.recent.find(i => i && i.id == app.id);
            const totalEps = loc ? (loc.episodes || 12) : 12;
            const nextEp = parseInt(app.ep) + 1;

            if (nextEp <= totalEps) {
                window.showToast(`Start aflevering ${nextEp}...`);
                window.autoUpdateProgressOnEpClick(app.id, loc ? loc.title : 'Anime', nextEp, totalEps, loc ? loc.coverImage : '');
                setTimeout(() => { nav('watch', { id: app.id, ep: nextEp }); }, 200);
            } else {
                window.showToast("Zoeken naar volgend seizoen...");
                gql(`query($id:Int){Media(id:$id){relations{edges{relationType node{id type status episodes coverImage{large} title{romaji english}}}}}}`, {id: parseInt(app.id)}).then(res => {
                    if (!res || !res.data) return window.showToast("Laatste aflevering al bereikt!", "error");
                    const edges = res.data.Media.relations.edges;
                    const sequelEdge = edges.find(e => e.relationType === 'SEQUEL' && e.node.type === 'ANIME');
                    
                    if (sequelEdge) {
                        const sequel = sequelEdge.node;
                        const sequelTitle = app.lang === 'english' ? (sequel.title.english || sequel.title.romaji) : sequel.title.romaji;
                        window.showConfirm("Wil je doorgaan naar het volgende seizoen?", sequelTitle, () => {
                            window.autoUpdateProgressOnEpClick(app.id, loc ? loc.title : 'Anime', totalEps, totalEps, loc ? loc.coverImage : '', 'Watched');
                            const newStatus = sequel.status === 'RELEASING' ? 'Dropped' : 'Watching';
                            window.autoUpdateProgressOnEpClick(sequel.id, sequelTitle, 1, sequel.episodes || 12, sequel.coverImage.large, newStatus);
                            nav('watch', { id: sequel.id, ep: 1 });
                        });
                    } else {
                        window.showToast("Anime voltooid! Geen volgend seizoen gevonden.", "success");
                        window.autoUpdateProgressOnEpClick(app.id, loc ? loc.title : 'Anime', totalEps, totalEps, loc ? loc.coverImage : '', 'Watched');
                    }
                });
            }
        };

                const ar = app.recent.find(r => r && r.id == app.id && r.ep == app.ep);

                                const now = new Date().getTime();
                                const distance = targetTime - now;

                                if (distance < 0) {
                                    clearInterval(countdownInterval);
                                    if(timerContainer) timerContainer.innerHTML = `<div class="bg-zinc-900/80 border border-accent/20 p-3 rounded-xl mb-4 text-center shadow-lg"><span class="text-xs font-black text-accent uppercase">Aflevering ${nextEpNum} is nu uit!</span></div>`;

                                }

                                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                                if(timerContainer) timerContainer.innerHTML = `
                                    <div class="bg-zinc-900/80 border border-white/5 p-3 rounded-xl mb-4 flex items-center justify-between shadow-lg">

                                        </span>

                        <div class="card p-8 bg-accent/5 text-center"><h2 class="font-black uppercase mb-2 text-sm accent">AniList Import</h2>
                        <button onclick="importAndMergeAniListCloud()" class="w-full bg-accent text-black font-black py-4 rounded-xl text-[10px] uppercase"><i class="fa-solid fa-cloud-arrow-down"></i> Nu Importeren</button></div>

                        <div class="card p-8 border-green-500/20 text-center"><h2 class="font-black uppercase mb-2 text-sm">Download XML Back-up (MAL-Ready)</h2>
                        <button onclick="exportMyAnimeListXML()" class="w-full bg-zinc-900 text-white hover:bg-accent hover:text-black font-black py-4 rounded-xl text-[10px] uppercase border border-white/15 transition-all"><i class="fa-solid fa-file-export"></i> XML Downloaden</button></div>

                        <div class="card p-8 border-white/5 text-center"><h2 class="font-black uppercase mb-4 text-sm">Import XML (MAL/HiAnime)</h2>
                        <input type="file" id="xml-input" class="text-[10px] text-zinc-500 mb-6 block mx-auto">
                        <button onclick="handleXML()" class="w-full bg-zinc-800 py-3.5 rounded-lg text-[10px] font-black uppercase border border-white/10">Upload & Merge</button></div>
                    </div>`;
            }
            else if (app.view === 'library') {
                main.innerHTML = `
                    <div class="flex items-center justify-between mb-4"><h2 class="text-xl font-black accent uppercase italic">Bibliotheek</h2><span class="text-[10px] text-zinc-500 uppercase font-black">${app.xmlLib.length} items</span></div>
                    <div class="flex gap-2 overflow-x-auto no-scrollbar pb-4 mb-4">
                        ${['All', 'Watching', 'Watched', 'Dropped', 'Plan to Watch'].map(s => `<button onclick="filterXml('${s}')" class="flex-shrink-0 px-4 py-2 rounded-full text-[9px] font-black uppercase ${app.libraryFilter === s ? 'bg-accent text-black' : 'bg-zinc-900 text-zinc-400 border border-white/5'}">${s}</button>`).join('')}
                    </div>
                    <div id="xml-display-grid" class="space-y-4 mt-2"></div>`;
                renderLibraryGrid();
            }
            else if (app.view === 'search') {
                main.innerHTML = `
                    <div class="max-w-md mx-auto mb-10"><input type="text" id="live-search" placeholder="Zoek op titel..." onkeyup="liveSearch(event)" class="w-full bg-zinc-900 border border-white/10 p-4 rounded-xl outline-none focus:border-accent text-white font-bold text-sm"></div>
                    <div id="search-grid" class="grid grid-cols-2 sm:grid-cols-6 gap-3"></div>`;
            }
            else {
                main.innerHTML = `<h2 class="text-xs font-black uppercase tracking-widest mb-6">Trending Now</h2><div id="h-grid" class="grid grid-cols-2 sm:grid-cols-6 gap-3"></div>`;
                const grid = document.getElementById('h-grid');
                STATIC_TRENDING.forEach(m => grid.innerHTML += `<button onclick="nav('watch', {id:'${m.id}'})" class="text-left group"><div class="aspect-[2/3] rounded-xl overflow-hidden mb-2 border border-white/5"><img src="${m.img}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"></div><p class="text-[9px] font-black uppercase truncate leading-none px-1 text-zinc-400 group-hover:text-white">${m.title}</p></button>`);
                
                gql(`query{Page(perPage:24){media(type:ANIME,sort:TRENDING_DESC){id title{romaji english}coverImage{large}}}}`).then(res => {
                    if (res && res.data && res.data.Page.media) {
                        grid.innerHTML = ''; 
                        res.data.Page.media.forEach(m => {
                            const t = app.lang === 'english' ? (m.title.english || m.title.romaji) : m.title.romaji;
                            grid.innerHTML += `<button onclick="nav('watch', {id:'${m.id}'})" class="text-left group animate-toast"><div class="aspect-[2/3] rounded-xl overflow-hidden mb-2 border border-white/5"><img src="${m.coverImage.large}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"></div><p class="text-[9px] font-black uppercase truncate leading-none px-1 text-zinc-400 group-hover:text-white">${t}</p></button>`;
                        });
                    }
                });
            }
        }

        window.renderLibraryGrid = function() {
            const grid = document.getElementById('xml-display-grid'); if (!grid) return;
            let fXml = app.libraryFilter === 'All' ? app.xmlLib : app.xmlLib.filter(i => i && (app.libraryFilter === 'Watched' ? (i.status === 'Watched' || i.status === 'Completed') : i.status === app.libraryFilter));

            if (!fXml.length) return grid.innerHTML = `<p class="text-xs uppercase font-black text-center text-zinc-600 mt-10">Leeg in categorie ${app.libraryFilter}</p>`;
            
            grid.innerHTML = '';
            fXml.forEach(item => {
                if (!item) return;
                const dStat = item.status === 'Watched' ? 'COMPLETED' : item.status.toUpperCase();
                grid.innerHTML += `
                    <div id="lib-card-${item.id}" data-id="${item.id}" class="lazy-card card p-4 flex flex-col sm:flex-row justify-between gap-4 border border-white/5 animate-fade-in">
                        <div class="flex gap-4 items-center flex-1 min-w-0">
                            <img id="img-${item.id}" src="${item.coverImage || 'https://images.unsplash.com/photo-1578632767115-351597cf2477?q=80&w=150'}" class="w-12 h-16 object-cover rounded-lg bg-zinc-900 border border-white/5">
                            <div class="truncate pr-4 flex-1">
                                <p class="text-white truncate font-bold text-sm mb-1">${item.title}</p>
                                <div class="flex items-center gap-2"><span class="text-[9px] bg-zinc-900 text-accent px-2 py-0.5 rounded font-black">${dStat}</span><span class="text-[9px] text-zinc-500 font-bold uppercase">Prog: <span id="progress-val-${item.id}">${item.progress}</span> / <span id="eps-total-${item.id}">${item.episodes || '?'}</span></span></div>
                            </div>
                        </div>
                        <div class="flex items-center gap-2 self-end sm:self-auto">
                            <button onclick="nav('watch', {id:'${item.id}', ep:${item.progress || 1}})" class="bg-[#1a1a1a] hover:bg-accent hover:text-black px-4 py-2.5 rounded-xl text-xs text-zinc-400 font-bold transition-colors"><i class="fa-solid fa-play"></i> Kijk</button>
                            <button onclick="quickIncrement('${item.id}')" class="bg-[#1a1a1a] hover:bg-zinc-800 px-4 py-2.5 rounded-xl text-xs text-zinc-400 font-black">+1 Ep</button>
                            <button onclick="changeLocalFolderPrompt('${item.id}')" class="bg-[#1a1a1a] hover:bg-zinc-800 p-3 rounded-xl text-xs text-zinc-400"><i class="fa-solid fa-folder-open"></i></button>
                            <button onclick="deleteLocalItem('${item.id}')" class="bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white p-3 rounded-xl text-xs transition-colors"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>`;
            });

            if (lazyObserver) lazyObserver.disconnect();
            lazyObserver = new IntersectionObserver(async (entries) => {
                for (let entry of entries) {
                    if (entry.isIntersecting) {
                        const id = entry.target.getAttribute('data-id');
                        lazyObserver.unobserve(entry.target);
                        const it = app.xmlLib.find(i => i && i.id == id);
                        if (it && (!it.coverImage || !it.episodes || it.episodes == 12)) {
                            const meta = await fetchMyAnimeListMetadata(id, null, it.title);
                            if (meta) {
                                it.coverImage = meta.coverImage; it.episodes = meta.episodes;
                                if (it.status === "Watched" && it.progress == 0) { it.progress = meta.episodes; document.getElementById(`progress-val-${id}`).innerText = meta.episodes; }
                                const img = document.getElementById(`img-${id}`); if (img) img.src = meta.coverImage;
                                const eps = document.getElementById(`eps-total-${id}`); if (eps) eps.innerText = meta.episodes;
                                saveCloudDataDebounced();
                            }
                        }
                    }
                }
            }, { rootMargin: "100px 0px" });

            document.querySelectorAll('.lazy-card').forEach(c => {
                const it = app.xmlLib.find(i => i && i.id == c.getAttribute('data-id'));
                if (it && (!it.coverImage || !it.episodes || it.episodes == 12)) lazyObserver.observe(c);
            });
        };
    </script>
</body>
</html>
